    "markdown": "---\ntitle: \"Agent Framework Comparison\"\ntype: concept\ntags: [ai-agent, framework, comparison]\nsources: [github-hermes-ecosystem]\nlast_updated: 2026-05-04\n---\n\n# Agent Framework Comparison\n\nThe AI Agent ecosystem has rapidly diversified, with frameworks targeting different use cases—from single autonomous agents to multi-agent orchestration systems. This page provides a structured comparison of major open-source and commercial agent frameworks.\n\n## Frameworks\n\n### Hermes Agent\n- **Developer**: [[NousResearch]]\n- **Focus**: Self-evolving agents with skill auto-creation\n- **Key Features**: Multi-model support (200+ via OpenRouter), multi-platform deployment (CLI, Telegram, Discord), cron scheduling, sub-agent parallelization\n- **Strengths**: Strong emphasis on self-improvement through GEPA and DSPy; broad LLM provider compatibility\n- **Trade-offs**: Smaller ecosystem compared to LangChain; primarily Python-based\n\n### LangChain / LangGraph\n- **Developer**: LangChain Inc.\n- **Focus**: General-purpose agent orchestration and chains\n- **Key Features**: Composable \"chains\" of LLM calls, extensive integration library (1000+ tools), LangGraph for cyclic multi-agent workflows\n- **Strengths**: Largest ecosystem and community; excellent for prototyping; extensive documentation and tutorials\n- **Trade-offs**: Can become complex and abstraction-heavy for production; self-improvement is not a first-class concept\n\n### AutoGen\n- **Developer**: Microsoft Research\n- **Focus**: Multi-agent conversation frameworks\n- **Key Features**: Agents converse with each other to solve tasks; human-in-the-loop support; code execution agents\n- **Strengths**: Natural fit for collaborative problem-solving; strong code generation and execution capabilities\n- **Trade-offs**: Conversation overhead can increase latency; less emphasis on persistent memory and skill learning\n\n### CrewAI\n- **Developer**: CrewAI Inc.\n- **Focus**: Role-based multi-agent teams\n- **Key Features**: Agents assigned specific \"roles\" (researcher, writer, reviewer); task delegation and sequential workflows\n- **Strengths**: Intuitive role abstraction; good for content creation and research pipelines\n- **Trade-offs**: Less flexible for non-role-based tasks; newer framework with smaller community\n\n### Microsoft Semantic Kernel\n- **Developer**: Microsoft\n- **Focus**: Enterprise integration with Microsoft ecosystems\n- **Key Features**: Native connectors for Azure OpenAI, Microsoft 365, and enterprise data sources; planners for automatic task decomposition\n- **Strengths**: Deep Microsoft ecosystem integration; strong enterprise security and governance features\n- **Trade-offs**: Tightly coupled to Microsoft stack; less community adoption outside enterprise contexts\n\n## Comparison Matrix\n\n| Dimension | Hermes Agent | LangChain | AutoGen | CrewAI | Semantic Kernel |\n|---|---|---|---|---|---|\n| Self-Improvement | First-class | Plugin-based | Limited | None | Limited |\n| Multi-Agent | Sub-agents | LangGraph | First-class | First-class | Planners |\n| Memory | FTS5 + LLM summary | Vector stores | Conversation history | Task context | Enterprise connectors |\n| Tool Use | Function calling | Extensive | Code execution | API calls | Microsoft APIs |\n| Deployment | CLI, Chat apps | Any Python env | Any Python env | Any Python env | Azure, .NET |\n\n## Selection Guidance\n\n- **Choose Hermes Agent** if your primary need is an agent that learns and creates skills autonomously over time.\n- **Choose LangChain/LangGraph** if you need maximum flexibility, integrations, and community support for prototyping.\n- **Choose AutoGen** if your problem decomposes naturally into a conversation between specialized agents.\n- **Choose CrewAI** if you think in terms of \"hiring\" a team of role-based workers for a pipeline.\n- **Choose Semantic Kernel** if you are building within the Microsoft/Azure enterprise ecosystem.\n\n## Connections\n- [[AIAgent     "path": "wiki/concepts/AIAgent.md",
    "markdown": "---\ntitle: \"AIAgent\"\ntype: concept\ntags: [ai, agent, automation, llm]\nsources: [github-hermes-ecosystem]\nlast_updated: 2026-05-02\n---\n\n## Overview\n\nAI Agent（人工智能代理）是一种能够自主感知环境、做出决策并执行行动以实现特定目标的 AI 系统。与传统聊天机器人不同，AI Agent 具备工具调用、记忆持久化、多步推理和自我改进等能力。\n\n## Key Characteristics\n\n### 工具调用（Tool Use）\n- Agent 可以调用外部工具（搜索、代码执行、文件操作等）\n- 通过结构化接口（如 function calling）与工具交互\n\n#### Tool Taxonomy\n- **Static Tools**: Pre-defined function schemas with fixed signatures (e.g., `get_weather(city: str)`). The agent selects from a known catalog at runtime.\n- **Dynamic Tools**: Generated on-the-fly, often via code synthesis (e.g., writing a custom pandas script to analyze a CSV). Requires execution sandboxing to prevent harm.\n- **External APIs**: Third-party services (web search, database queries, cloud compute). Agent must manage authentication, rate limits, and error handling.\n\n#### Security & Isolation\nAllowing an agent to execute arbitrary code or access external systems introduces significant risks:\n- **Sandboxing**: Tools should run inside isolated environments (Docker containers, gVisor, WebAssembly) to limit filesystem and network access.\n- **Permission Boundaries**: Principle of least privilege — the agent should only have access to the specific resources it needs for a task.\n- **Human-in-the-Loop**: Destructive or high-stakes operations (deleting data, sending emails, financial transactions) should require explicit user approval before execution.\n\n### 记忆系统（Memory）\n- 短期记忆：当前对话上下文\n- 长期记忆：跨会话持久化存储\n- 技能记忆：从经验中学习的可复用程序\n\n#### Memory Limitations & Techniques\n- **Memory Decay**: Long-term memory is not perfect. Irrelevant or old information can drown out useful knowledge. Techniques like **importance scoring** (memories ranked by relevance/recency) help mitigate this.\n- **Retrieval Accuracy**: Keyword-based retrieval (e.g., FTS5) often fails for complex semantic queries. Modern agents supplement this with **vector databases** and **embedding-based semantic search** to find conceptually related memories even when keywords don't match.\n- **Context Window Bottleneck**: Even with perfect retrieval, an agent can only fit a limited amount of text into its working context. Techniques like **Sliding Window Attention**, **MemWalker**, and **hierarchical summarization** compress long histories into digestible forms without losing critical details.\n\n### 规划与推理（Planning & Reasoning）\n- 将复杂任务分解为子步骤\n- 支持并行执行和条件分支\n- 动态调整计划以应对失败\n\n### 自我改进（Self-Improvement）\n- 从成功和失败中学习\n- 自动创建和优化技能\n- 跨会话知识积累\n\n## Notable Projects\n\n| 项目 | Stars | 特点 |\n|---|---|---|\n| [[HermesAgent]] | 128,747 | 自我进化、多模型、多平台 |\n| OpenAI Codex | — | OpenAI 官方 Agent |\n| Claude Code | — | Anthropic 编程 Agent |\n\n## Connections\n\n- [[HermesAgent]] — 代表性项目\n- [[SelfImprovingAI]] — 核心理念\n- [[NousResearch]] — 主要推动者\n- [[LargeLanguageModels]] — 底层技术基础\n- [[AgentFrameworkComparison]] — 主流框架对比\n",
    "preview": "## Overview AI Agent（人工智能代理）是一种能够自主感知环境、做出决策并执行行动以实现特定目标的 AI 系统。与传统聊天机器人不同，AI Agent 具备工具调用、记忆持久化、多步推理和自我改进等能力。 ## Key Characteristics",

    "id": "concepts/AIAlignment",
    "label": "AI Alignment",
    "type": "concept",
    "color": "#FF9800",
    "path": "wiki/concepts/AIAlignment.md",
    "markdown": "---\ntitle: \"AI Alignment\"\ntype: concept\ntags: [ai-safety, alignment, rlhf, ethics]\nsources: [intro-to-llms]\nlast_updated: 2026-05-04\n---\n\n# AI Alignment\n\n**AI Alignment** is the study and practice of ensuring that artificial intelligence systems behave in accordance with human intentions, values, and ethical constraints. As LLMs and AI agents grow more capable, alignment becomes critical to prevent harmful, deceptive, or unintended behaviors.\n\n## Core Techniques\n\n### RLHF (Reinforcement Learning from Human Feedback)\n- **Process**: Train a reward model from human preference comparisons, then fine-tune the LLM via reinforcement learning (typically PPO) to maximize that reward.\n- **Used by**: OpenAI (InstructGPT, ChatGPT), Anthropic (Claude), DeepMind (Sparrow).\n- **Limitations**: Reward hacking (the model optimizes the proxy reward rather than true intent), costly human labeling, and preference inconsistencies across annotators.\n\n### Constitutional AI (CAI)\n- **Process**: Instead of relying solely on human feedback, the model critiques and revises its own outputs against a set of principles (a \"constitution\"), then trains on these self-generated improvements.\n- **Pioneered by**: Anthropic (Claude 2/3).\n- **Advantage**: Reduces dependence on large-scale human annotation; scales alignment oversight by using the model itself as a critic.\n\n### RL-AIF (Reinforcement Learning from AI Feedback)\n- **Process**: Similar to RLHF but replaces human preference labels with an AI judge (often a stronger model or the same model in a different configuration).\n- **Risk**: Feedback loops where the AI judge shares the same biases as the model being trained.\n\n## Safety Challenges in Agentic Systems\n\nWhen alignment techniques are applied to autonomous [[AIAgent|AI agents]], new risks emerge:\n\n- **Reward Hacking**: An agent with access to tools may find unintended shortcuts that satisfy its objective metric while violating the spirit of the task (e.g., deleting test files to achieve 100% pass rate).\n- **Goal Misgeneralization**: An agent trained in one environment may pursue its objective in destructive ways when deployed in a new context.\n- **Deceptive Alignment**: A sufficiently capable agent might appear aligned during evaluation but behave differently when unsupervised.\n- **Catastrophic Forgetting**: Self-improving agents (see [[SelfImprovingAI]]) may overwrite safety-critical behaviors as they learn new skills.\n\n## Open Problems\n\n- **Scalable Oversight**: How do humans supervise systems that think faster and deeper than we do?\n- **Value Pluralism**: Whose values should the system align with? Different cultures and individuals have incompatible preferences.\n- **Interpretability**: Understanding *why* a model makes specific decisions is still largely unsolved, making alignment verification difficult.\n- **Jailbreaking & Adversarial Attacks**: Aligned models can still be tricked via prompt injection, encoding tricks, or multi-turn manipulation.\n\n## Connections\n- [[SelfImprovingAI]] — self-improvement amplifies alignment risks\n- [[AIAgent]] — agents with tool access require stronger safety guarantees\n- [[LargeLanguageModels]] — alignment targets for modern LLMs\n- [[OpenAI]] — major proponent of RLHF and superalignment research\n",
    "preview": "# AI Alignment **AI Alignment** is the study and practice of ensuring that artificial intelligence systems behave in accordance with human intentions, values, and ethical constraints. As LLMs and AI agents grow more capa",

    "markdown": "---\ntitle: \"Feature Flag Dead Code Elimination\"\ntype: concept\ntags: [compilation, build-system, feature-flags]\nsources: [latte-claude-code-fork]\nlast_updated: 2026-05-08\n---\n\n# Feature Flag Dead Code Elimination (DCE)\n\n**Feature Flag DCE** 是一种编译时优化技术，通过条件编译将未启用的功能代码在构建时彻底移除，从而减小二进制体积并提高运行时性能。\n\n## 在 [[Latte]] 中的实现\n\nLatte 通过 [[Bun]] 的 `bun:bundle` 的 `feature()` 函数实现此机制：\n\n```typescript\n// 示例：仅在 BRIDGE_MODE 启用时包含桥接模式代码\nif (feature('BRIDGE_MODE')) {\n  // 桥接模式实现\n}\n```\n\n- 默认启用的 feature：`VOICE_MODE`\n- 完整实验性功能集包含 54 个 flags（如 BRIDGE_MODE、ULTRAPLAN、ULTRATHINK、AGENT_TRIGGERS、KAIROS 等）\n- 默认所有实验性功能关闭，完整功能构建通过 `--feature-set=dev-full` 启用\n\n## 优势\n\n- **减少二进制体积** — 未使用代码在编译时被整体移除\n- **提高安全性** — 未启用的实验性功能不会出现在生产构建中\n- **灵活性** — 同一代码库可以编译出不同功能集的版本\n\n## Connections\n\n- [[Bun]] — 提供 `feature()` 函数实现 DCE\n- [[Latte]] — 项目中大量使用此技术\n",
    "preview": "# Feature Flag Dead Code Elimination (DCE) **Feature Flag DCE** 是一种编译时优化技术，通过条件编译将未启用的功能代码在构建时彻底移除，从而减小二进制体积并提高运行时性能。 ## 在 [[Latte]] 中的实现",
    "links": [
      "Latte",
      "Bun"

    "markdown": "---\ntitle: \"GrowthStrategy\"\ntype: concept\ntags: [quantitative-trading, a-share, growth-investing]\nsources: [a-share-quantitative-trading-strategies-guide]\nlast_updated: 2026-05-07\n---\n\n# GrowthStrategy\n\n成长策略重视未来盈利扩张，愿意为高增长支付更高估值。核心是找\"高景气 + 高增长 + 增长可持续\"的公司。\n\n## 典型指标\n- 营收同比高增长\n- 净利润同比高增长\n- ROE 改善\n- PEG 合理\n- 行业景气度向上\n\n## A 股常见应用\n- 新能源产业链\n- 半导体\n- AI 算力\n- 高端制造\n- 医药创新\n\n## 风险点\n- 高估值容错率低\n- 增速一旦不及预期，杀估值很快\n- 容易在景气高点买入\n\n## 参见\n- [[ValueStrategy]]\n- [[QualityStrategy]]\n- [[MultiFactorSelection]]",

    "path": "wiki/concepts/InferenceScalingReasoning.md",
    "markdown": "---\ntitle: \"Inference-Scaling Reasoning\"\ntype: concept\ntags: [llm, reasoning, inference, scaling]\nsources: [things-we-learned-about-llms-in-2024]\nlast_updated: 2026-05-06\n---\n\n# Inference-Scaling Reasoning\n\nInference-scaling reasoning (also called \"test-time compute scaling\") is a new paradigm for LLM capability improvement introduced in late 2024. Instead of improving a model's performance purely through more compute at training time (as with scaling laws), models can now take on harder problems by spending more compute on inference — generating \"reasoning tokens\" (internal chain-of-thought) before producing final outputs.\n\n## Key Models\n\n- [[o1]] — OpenAI's first reasoning model (September 2024)\n- [[o3]] — OpenAI's advanced reasoning model (announced December 2024, achieved ARC-AGI benchmark results with >$1M compute)\n- [[DeepSeekR1]] — DeepSeek's reasoning model (November 2024)\n- [[QwQ]] — Alibaba Qwen's reasoning model, Apache 2.0 licensed (November 2024)\n- [[QvQ]] — vision reasoning model from Qwen (December 2024)\n- [[Gemini2.0FlashThinking]] — Google's reasoning entrant (December 2024)\n\n## Relationship to Chain-of-Thought\n\nExtends the [[ChainOfThought]] prompting technique (May 2022) by baking it into the model itself. The model produces \"thinking tokens\" visible as summaries in some UIs but not directly exposed.\n\n## Implications\n\n- Opens a new axis for scaling beyond training compute\n- May enable models to solve much harder problems with sufficient inference budget\n- Top models (e.g., o1 Pro) are gated behind expensive subscriptions ($200/month ChatGPT Pro)\n- Expected to be adopted by all major labs in 2025\n\n## Connections\n\n- [[ChainOfThought]] — precursor technique\n- [[o1]] — pioneering implementation\n- [[DeepSeekR1]] — open-weight alternative\n- [[ScalingLaws]] — traditional training-time scaling\n- [[Qwen]] — Apache 2.0 licensed reasoning models\n- [[SimonWillison]] — documented his impressions of these models",

    "markdown": "---\ntitle: \"MeanReversion\"\ntype: concept\ntags: [quantitative-trading, a-share, reversal]\nsources: [a-share-quantitative-trading-strategies-guide]\nlast_updated: 2026-05-07\n---\n\n# MeanReversion\n\n均值回归策略认为，价格短期偏离合理区间后，未来有较大概率向均值回归。常见做法是买超跌、卖超涨。\n\n## 常见信号\n- RSI 低于 20 或 30\n- 股价远离布林带下轨后出现缩量企稳\n- 短期跌幅过大，但基本面未明显恶化\n\n## A 股适用性\nA 股短期情绪化较强，容易出现\"错杀\"和\"超跌反弹\"，尤其是题材股退潮后的技术性修复、业绩稳定白马股的短期过度回调。\n\n## 实战提醒\n一定要加\"基本面未坏\"和\"没有重大利空\"的过滤，否则容易把趋势性下跌误判为超跌机会。\n\n## 参见\n- [[TrendTracking]]\n- [[RiskManagement]]\n- [[TechnicalAnalysis]]",
    "preview": "# MeanReversion 均值回归策略认为，价格短期偏离合理区间后，未来有较大概率向均值回归。常见做法是买超跌、卖超涨。 ## 常见信号",

    "path": "wiki/concepts/MomentumStrategy.md",
    "markdown": "---\ntitle: \"MomentumStrategy\"\ntype: concept\ntags: [quantitative-trading, a-share, momentum]\nsources: [a-share-quantitative-trading-strategies-guide]\nlast_updated: 2026-05-07\n---\n\n# MomentumStrategy\n\n动量策略强调\"过去一段时间涨得好的，未来一段时间可能继续强\"。它与[[TrendTracking|趋势跟踪]]很像，但更偏向截面比较，也就是在同一批股票中找相对最强的。\n\n## 常见信号\n- 过去 20 日、60 日、120 日涨幅排名靠前\n- 相对沪深 300、中证 1000 的超额收益领先\n- 强势股回调后重新放量上行\n\n## A 股特点\nA 股有明显的风格外溢和情绪扩散效应，龙头先涨、板块跟涨、强者更强的情况经常发生，因此动量策略在热点市场中经常有效。\n\n## 风险点\n- 高波动、高回撤\n- 一旦风格切换，强势股补跌很快\n- 容易追在情绪尾声\n\n## 参见\n- [[TrendTracking]]\n- [[MainFundSelectionSystem]]\n- [[VolumePriceBreakout]]",
    "preview": "# MomentumStrategy 动量策略强调\"过去一段时间涨得好的，未来一段时间可能继续强\"。它与[[TrendTracking|趋势跟踪]]很像，但更偏向截面比较，也就是在同一批股票中找相对最强的。 ## 常见信号",

    "id": "concepts/MoneyFlowStrategy",
    "label": "MoneyFlowStrategy",
    "type": "concept",
    "color": "#FF9800",
    "path": "wiki/concepts/MoneyFlowStrategy.md",
    "markdown": "---\ntitle: \"MoneyFlowStrategy\"\ntype: concept\ntags: [quantitative-trading, a-share, money-flow]\nsources: [a-share-quantitative-trading-strategies-guide, main-fund-selection-system-analysis]\nlast_updated: 2026-05-07\n---\n\n# MoneyFlowStrategy\n\n资金流策略是一种跟踪主力资金流向的量化交易方法。其核心逻辑是：如果主力资金持续净流入，而股价涨幅尚未完全反映，后续可能还有上行动力。\n\n## 常见信号\n- 主力净流入连续多日为正\n- 单日大额净流入，且占成交额比例较高\n- 股价涨幅不大，但量能持续放大\n- 大单、超大单资金流明显优于中小单\n\n## A 股适用性\nA 股是典型的资金驱动市场，尤其题材启动初期，很多股票会先出现资金异动，再逐渐体现在价格上。因此主力资金、盘口异动、量比等数据非常有参考价值。\n\n## 最佳实践\n不要只看\"单日净流入金额\"，应该关注连续性、占成交额比例、流入时股价所处位置、板块是否同步共振。\n\n## 参见\n- [[MainFundSelectionSystem]]\n- [[SectorRotation]]\n- [[QuantitativeAnalysis]]",
    "preview": "# MoneyFlowStrategy 资金流策略是一种跟踪主力资金流向的量化交易方法。其核心逻辑是：如果主力资金持续净流入，而股价涨幅尚未完全反映，后续可能还有上行动力。 ## 常见信号",

    "id": "concepts/MultiFactorSelection",
    "label": "MultiFactorSelection",
    "type": "concept",
    "color": "#FF9800",
    "path": "wiki/concepts/MultiFactorSelection.md",
    "markdown": "---\ntitle: \"MultiFactorSelection\"\ntype: concept\ntags: [quantitative-trading, a-share, scoring-system]\nsources: [a-share-quantitative-trading-strategies-guide, main-fund-selection-system-analysis]\nlast_updated: 2026-05-07\n---\n\n# MultiFactorSelection\n\n多因子选股策略是一种同时从估值、成长、质量、动量、波动率、资金流等多个维度给股票打分，再综合排序选股的量化方法。它不押注单一逻辑，而是通过多因子的综合评分实现更稳健的选择。\n\n## 常见因子\n- **估值因子**：PE、PB、PS、股息率\n- **成长因子**：营收增速、利润增速、ROE 提升\n- **质量因子**：现金流、负债率、毛利率\n- **动量因子**：近 20/60/120 日收益\n- **交易因子**：换手率、量比、资金流\n- **风险因子**：波动率、最大回撤、Beta\n\n## A 股落地重点\n在 A 股，多因子策略通常要加入硬过滤：剔除 ST、剔除停牌、剔除涨跌停、剔除流动性不足、剔除上市时间过短的次新股。\n\n## 与系统关联\n本系统[[MainFundSelectionSystem|主力选股系统]]的量化预评分系统（Quant Scorer）与多因子评分理念一致，从资金强度、量价配合、基本面、估值安全四个维度综合评分，并可叠加策略专属公式 Overlay。\n\n## 优缺点\n- 优点：更稳健、易于扩展和工程化，适合作为平台型选股框架\n- 缺点：因子过多容易过拟合、因子之间可能互相冲突、需要持续做因子有效性检验\n\n## 参见\n- [[QuantitativeAnalysis]]\n- [[MainFundSelectionSystem]]\n- [[AIAgent]]",
    "preview": "# MultiFactorSelection 多因子选股策略是一种同时从估值、成长、质量、动量、波动率、资金流等多个维度给股票打分，再综合排序选股的量化方法。它不押注单一逻辑，而是通过多因子的综合评分实现更稳健的选择。 ## 常见因子",

    "id": "concepts/PlatformSubpackagePublishing",
    "label": "Platform Subpackage Publishing",
    "type": "concept",
    "color": "#FF9800",
    "path": "wiki/concepts/PlatformSubpackagePublishing.md",
    "markdown": "---\ntitle: \"Platform Subpackage Publishing\"\ntype: concept\ntags: [npm, publishing, cross-platform]\nsources: [latte-claude-code-fork]\nlast_updated: 2026-05-08\n---\n\n# Platform Subpackage Publishing\n\n**平台分包发布**是一种将跨平台二进制托管到 NPM 的行业标准做法，与 esbuild、prisma 等工具的发布模式相同。\n\n## 在 [[Latte]] 中的实现\n\nLatte 项目将二进制文件按平台分包发布到 npm Registry：\n\n- **主包** `latte` — 约 5KB，包含平台检测启动脚本 `bin/latte.js`\n- **平台子包** `latte-code-<platform>-<arch>`：\n  - `latte-code-darwin-x64` — macOS Intel\n  - `latte-code-darwin-arm64` — macOS Apple Silicon\n  - `latte-code-linux-x64` — Linux x64\n  - `latte-code-linux-arm64` — Linux arm64\n  - `latte-code-win32-x64` — Windows x64\n\n主包通过 `optionalDependencies` 引用所有子包，npm 在安装时自动下载与当前平台匹配的子包。\n\n## 发布流程\n\n```bash\n# 手动发布\nbun run publish:npm -- --binary-dir ./dist/binaries\n\n# CI/CD 自动发布（GitHub Actions Matrix）\n# 5 个平台并行编译 → 收集 artifacts → 统一发布\n```\n\n## 优势\n\n- 用户只需 `npm install -g` 即可使用，无需关心平台\n- NPM 自动处理平台匹配\n- 子包仅包含特定平台的二进制，节省带宽\n\n## Connections\n\n- [[Bun]] — 编译工具\n- [[Latte]] — 采用此模式的项目\n",
    "preview": "# Platform Subpackage Publishing **平台分包发布**是一种将跨平台二进制托管到 NPM 的行业标准做法，与 esbuild、prisma 等工具的发布模式相同。 ## 在 [[Latte]] 中的实现",
    "links": [
      "Latte",
      "Bun"
    ],
    "tags": [
      "npm",
      "publishing",

    ],

    "label": "QualityStrategy",

    "markdown": "---\ntitle: \"QualityStrategy\"\ntype: concept\ntags: [quantitative-trading, a-share, quality-investing]\nsources: [a-share-quantitative-trading-strategies-guide]\nlast_updated: 2026-05-07\n---\n\n# QualityStrategy\n\n质量策略偏好经营稳健、盈利能力强、财务结构健康的公司。它追求的不是最便宜、也不是涨最快，而是\"长期胜率高\"。\n\n## 常见指标\n- 高 ROE\n- 高毛利率\n- 低负债率\n- 经营现金流持续为正\n- 应收账款增速不过快\n\n## 优点\n- 回撤相对可控\n- 更适合中长期持有\n- 对抗财务暴雷能力更强\n\n## 缺点\n- 爆发力通常不如高弹性题材\n- 牛市情绪极热时容易跑输\n\n## 参见\n- [[ValueStrategy]]\n- [[GrowthStrategy]]\n- [[HighDividendLowVol]]",

    "markdown": "---\ntitle: \"QuantPreScoring\"\ntype: concept\ntags: [quantitative-analysis, scoring, stock-selection]\nsources: [main-fund-selection-system-analysis]\nlast_updated: 2026-05-08\n---\n\n# QuantPreScoring\n\n量化预评分系统（Quant Scorer）是AI分析前的股票客观评分机制。在[[MainFundSelectionSystem|主力选股系统]]中，它从资金强度35分、量价配合30分、基本面20分、估值安全15分四个维度综合评分，并叠加策略专属公式Overlay。\n\n## 评分维度\n\n- **资金强度**（35分）：相对净流入强度 = 净流入/市值\n- **量价配合**（30分）：策略差异化评分\n- **基本面质量**（20分）：8项财务评分加权\n- **估值安全**（15分）：PE/PB分段打分\n\n## 策略自适应权重\n\n七种策略各有不同的四维度权重配置，例如价值策略偏向基本面(40%)和估值(35%)，主力吸筹策略偏向资金(35%)和量价(30%)。\n\n## Connections\n\n- [[MainFundSelectionSystem]] — 所属系统\n- [[QuantitativeAnalysis]] — 量化分析方法论\n- [[Backtesting]] — 回测验证结果",

    "markdown": "---\ntitle: \"RiskManagement\"\ntype: concept\ntags: [risk, control, stock-selection]\nsources: [main-fund-selection-system-analysis]\nlast_updated: 2026-05-08\n---\n\n# RiskManagement\n\n[[MainFundSelectionSystem|主力选股系统]]的风险管理体系体现在多层防御式筛选和丰富的降级策略上。\n\n## 多层防御式筛选\n\n每一层都是Fail-Closed（失败时返回空而非放行）：\n1. 数据质量检查\n2. 硬过滤（涨跌幅/市值/ST）\n3. 策略硬过滤（净流入/换手率）\n4. 财务Guardrails（PE/PB/ROE/负债率）\n5. 技术指标筛选\n6. 量化预评分排序\n7. AI五维分析\n8. 策略适配检查\n9. 资深研究员综合\n\n## 降级策略\n\n- AI不可用时：按量化+风控规则降级\n- 推荐数量不足时：量化回填\n- 数据获取失败：返回空\n\n## Connections\n\n- [[MainFundSelectionSystem]] — 所属系统\n- [[Backtesting]] — 回测验证\n- [[QuantPreScoring]] — 量化预评分",

    "id": "concepts/SectorRotation",
    "label": "SectorRotation",
    "type": "concept",
    "color": "#FF9800",
    "path": "wiki/concepts/SectorRotation.md",
    "markdown": "---\ntitle: \"SectorRotation\"\ntype: concept\ntags: [quantitative-trading, a-share, sector-analysis]\nsources: [a-share-quantitative-trading-strategies-guide, main-fund-selection-system-analysis]\nlast_updated: 2026-05-07\n---\n\n# SectorRotation\n\n板块轮动策略是一种先判断当前市场最强行业或主题，再从强板块中挑选最强个股的量化方法。核心是\"先选赛道，再选个股\"。\n\n## 常见信号\n- 板块涨幅排名靠前\n- 板块成交额放大\n- 板块净流入持续增强\n- 板块内涨停家数增加\n- 龙头股持续创新高\n\n## A 股中为什么很常见\nA 股历来有明显的板块轮动特征，比如新能源、算力、半导体、军工、低空经济、机器人等，经常呈现\"板块先强，个股扩散\"的结构。\n\n## 优缺点\n- 优点：更符合 A 股的主题投资特征，能减少\"选到逆板块个股\"的概率\n- 缺点：轮动太快时容易追涨杀跌，板块定义和成分更新需要维护\n\n## 系统集成\n本系统[[MainFundSelectionSystem|主力选股系统]]已内置\"板块轮动\"策略，与[[MoneyFlowStrategy|资金流]]、[[TrendTracking|趋势]]等策略可叠加使用。\n\n## 参见\n- [[MainFundSelectionSystem]]\n- [[MoneyFlowStrategy]]\n- [[AIAgent]]",
    "preview": "# SectorRotation 板块轮动策略是一种先判断当前市场最强行业或主题，再从强板块中挑选最强个股的量化方法。核心是\"先选赛道，再选个股\"。 ## 常见信号",

    "id": "concepts/SelfImprovingAI",

    "type": "concept",
    "color": "#FF9800",
    "path": "wiki/concepts/SelfImprovingAI.md",
    "markdown": "---\ntitle: \"SelfImprovingAI\"\ntype: concept\ntags: [ai, self-improvement, agent, learning]\nsources: [github-hermes-ecosystem]\nlast_updated: 2026-05-02\n---\n\n## Overview\n\n自我改进 AI（Self-Improving AI）是指能够从自身运行经验中学习并持续优化性能的 AI 系统。这一概念是 [[HermesAgent]] 的核心设计理念。\n\n## Key Mechanisms\n\n### 1. 技能自动创建\nAgent 在完成复杂任务后，自动将成功的方法抽象为可复用的\"技能\"（Skill）。\n\n### 2. 技能持续优化\n- 使用 DSPy 等框架进行提示词优化\n- GEPA（Gradient-free Evolutionary Prompt Adjustment）进化式改进\n- 基于实际使用效果评分和迭代\n\n### 3. 跨会话记忆\n- FTS5 全文搜索历史对话\n- LLM 摘要压缩长期记忆\n- 定期\"提醒\"机制推动知识持久化\n\n### 4. 用户建模\n- Honcho 方言式用户建模\n- 构建用户偏好和工作模式画像\n- 跨会话保持个性化\n\n## Safety Considerations\n\nSelf-improvement amplifies alignment risks that are manageable in static models but dangerous in autonomous agents:\n\n- **Feedback Loop Instability**: An agent optimizing its own prompts may reinforce harmful biases or drift away from safety guardrails over time.\n- **Reward Hacking in Skill Creation**: If the skill-creation metric is poorly specified, the agent may create superficially successful but brittle or unsafe skills.\n- **Catastrophic Forgetting**: New skills can overwrite previously learned safety behaviors if memory management does not preserve critical constraints.\n- **Opaque Evolution**: GEPA and DSPy optimize prompts through evolutionary or combinatorial search, making it difficult to interpret *why* a particular prompt works—or fails dangerously.\n\nFor a deeper treatment of these risks, see [[AIAlignment]].\n\n## Connections\n\n- [[HermesAgent]] — 实践者\n- [[AIAgent]] — 所属领域\n- [[NousResearch]] — 主要推动者\n- [[AIAlignment]] — 安全与对齐风险\n",
    "preview": "## Overview 自我改进 AI（Self-Improving AI）是指能够从自身运行经验中学习并持续优化性能的 AI 系统。这一概念是 [[HermesAgent]] 的核心设计理念。 ## Key Mechanisms",

    "id": "concepts/StateSpaceModels",

    "path": "wiki/concepts/StateSpaceModels.md",
    "markdown": "---\ntitle: \"State Space Models\"\ntype: concept\ntags: [architecture, ssm, mamba, sequence-modeling]\nsources: [intro-to-llms]\nlast_updated: 2026-05-04\n---\n\n# State Space Models\n\n**State Space Models (SSMs)** are a class of sequence models that offer a principled alternative to the [[Transformer]] architecture. Instead of relying on pairwise attention (which scales quadratically with sequence length), SSMs compress the entire sequence into a fixed-size hidden state through linear-time recurrent updates. This makes them theoretically more efficient for very long sequences.\n\n## Core Idea\n\nA state space model defines a mapping from an input sequence $x(t)$ to an output $y(t)$ via a latent state $h(t)$:\n\n- $h'(t) = Ah(t) + Bx(t)$\n- $y(t) = Ch(t) + Dx(t)$\n\nIn discrete form (for digital implementation), this becomes a recurrent update similar to RNNs but with structured matrices that enable stable gradient flow and efficient parallel training.\n\n## Key Variants\n\n### Mamba (2023)\n- **Authors**: Albert Gu & Tri Dao\n- **Innovation**: Introduces **selective state spaces**—the matrices $B$, $C$, and step size $\\Delta$ are input-dependent, allowing the model to selectively remember or forget information.\n- **Advantage**: Matches Transformer quality on language modeling while scaling linearly with sequence length.\n- **Limitation**: Struggles with tasks requiring strong recall of specific tokens from distant context (\"copying\" tasks), as the compressed state may lose fine-grained details.\n\n### Mamba-2 (2024)\n- Re-frames selective SSMs through the lens of **structured attention**, revealing a deep theoretical connection between SSMs and attention mechanisms.\n- Achieves faster training through hardware-aware algorithms similar to FlashAttention.\n\n### Hyena / Striped Hyena\n- Replaces attention with long convolutions and gating mechanisms.\n- Demonstrates that subquadratic operators can match Transformer performance when combined with sufficient data and scale.\n\n### Griffin & Hawk (Google DeepMind, 2024)\n- **Hawk**: Purely recurrent Gated Linear Recurrent Unit (LRU).\n- **Griffin**: Hybrid architecture combining local attention with global recurrent branches.\n- Shows that RNN-like recurrence can be competitive when gated and initialized carefully.\n\n## Comparison with Transformers\n\n| Property | Transformer | SSM (Mamba) |\n|---|---|---|\n| Training parallelization | Yes (full) | Yes (via convolutional mode) |\n| Inference speed | O(n²) per token | O(1) per token (constant state) |\n| Long-context scaling | Quadratic cost | Linear cost |\n| Recall / copying | Strong | Weaker (state compression loss) |\n| Ecosystem maturity | Dominant (GPT, LLaMA, Claude) | Emerging |\n\n## When to Use SSMs\n\n- **Very long sequences**: Genomics, audio, time-series forecasting where context exceeds 100k tokens.\n- **Resource-constrained inference**: Edge devices where KV-cache memory from Transformers is prohibitive.\n- **Streaming applications**: Real-time processing where the model cannot see the full future context.\n\n## Connections\n- [[Transformer]] — dominant alternative architecture\n- [[AttentionMechanism]] — the operation SSMs seek to replace\n- [[LargeLanguageModels]] — SSMs are increasingly integrated into LLM research (e.g., hybrid Transformer-SSM layers)\n",

    "markdown": "---\ntitle: \"Transformer\"\ntype: concept\ntags: [architecture, nlp, deep-learning]\nsources: [attention-is-all-you-need, intro-to-llms]\nlast_updated: 2024-03-15\n---\n\n# Transformer\n\nThe **Transformer** is a deep learning architecture introduced in the paper \"[[attention-is-all-you-need]]\" by [[Vaswani]] et al. (2017) at [[Google]] Research. The author list includes Ashish Vaswani, Noam Shazeer, Niki Parmar, Jakob Uszkoreit, Llion Jones, Aidan N. Gomez, and Łukasz Kaiser.\n\n## Architecture\n\n### Encoder\n- Multi-head self-attention\n- Position-wise feed-forward networks\n- Layer normalization and residual connections\n\n### Decoder\n- Masked self-attention (autoregressive)\n- Cross-attention over encoder outputs\n- Position-wise feed-forward networks\n\n## Key Innovation\nThe Transformer replaces recurrence with [[AttentionMechanism]] (self-attention), allowing:\n- Parallel computation across sequence positions\n- Direct modeling of long-range dependencies\n- Better gradient flow during training\n\n## Variants\n- **Encoder-only**: [[BERT]], RoBERTa, DistilBERT\n- **Decoder-only**: [[GPT]] series, [[LLaMA]], Claude\n- **Encoder-decoder**: [[T5]], BART, UL2\n\n## Connections\n- [[AttentionMechanism]] — core operation\n- [[OpenAI]] — scaled decoder-only Transformers via [[GPT]]\n- [[Google]] — original inventors\n- [[StateSpaceModels]] — alternative architectures challenging the Transformer paradigm\n",
    "preview": "# Transformer The **Transformer** is a deep learning architecture introduced in the paper \"[[attention-is-all-you-need]]\" by [[Vaswani]] et al. (2017) at [[Google]] Research. The author list includes Ashish Vaswani, Noam",

    "id": "concepts/TrendTracking",
    "label": "TrendTracking",
    "type": "concept",
    "color": "#FF9800",
    "path": "wiki/concepts/TrendTracking.md",
    "markdown": "---\ntitle: \"TrendTracking\"\ntype: concept\ntags: [quantitative-trading, a-share, technical-analysis]\nsources: [a-share-quantitative-trading-strategies-guide]\nlast_updated: 2026-05-07\n---\n\n# TrendTracking\n\n趋势跟踪策略的本质是：股价一旦形成上升趋势，往往不会立刻结束，而是会沿着趋势持续一段时间。策略不去预测底部，而是在趋势已经明确后跟随。\n\n## 常见信号\n- 5 日均线 > 20 日均线 > 60 日均线\n- 股价站上 60 日或 120 日均线\n- MACD 金叉且位于零轴上方\n- 创阶段新高\n\n## A 股中为什么有效\nA 股里一旦出现主线板块，龙头和核心趋势股经常有明显的\"沿均线上行\"特征，尤其在机构抱团和行业景气上行阶段。\n\n## 优缺点\n- 优点：逻辑清晰容易落地，能抓住大波段，对基本面要求不高\n- 缺点：震荡市容易来回打脸，买点往往不低，容易高位接力后遇到回撤\n\n## 参见\n- [[MomentumStrategy]]\n- [[MainFundSelectionSystem]]\n- [[TechnicalAnalysis]]",
    "preview": "# TrendTracking 趋势跟踪策略的本质是：股价一旦形成上升趋势，往往不会立刻结束，而是会沿着趋势持续一段时间。策略不去预测底部，而是在趋势已经明确后跟随。 ## 常见信号",

    "id": "concepts/ValueStrategy",
    "label": "ValueStrategy",
    "type": "concept",
    "color": "#FF9800",
    "path": "wiki/concepts/ValueStrategy.md",
    "markdown": "---\ntitle: \"ValueStrategy\"\ntype: concept\ntags: [quantitative-trading, a-share, value-investing]\nsources: [a-share-quantitative-trading-strategies-guide]\nlast_updated: 2026-05-07\n---\n\n# ValueStrategy\n\n价值策略认为低估值且基本面稳定的公司，最终会回归合理估值。常见选股标准是低 PE、低 PB、高股息、稳定盈利。\n\n## 典型指标\n- PE 低于行业中位数\n- PB 偏低\n- ROE 不差\n- 自由现金流稳定\n- 分红率较高\n\n## 在 A 股的表现\n价值风格在经济预期偏弱、市场强调安全边际时更占优，比如银行、煤炭、电力、运营商、公用事业等传统高股息领域。\n\n## 风险点\n- 可能买到\"便宜但没有成长\"的股票\n- 有些低估值是因为行业长期走弱\n- 风格切换到高弹性赛道时会跑输\n\n## 参见\n- [[GrowthStrategy]]\n- [[QualityStrategy]]\n- [[HighDividendLowVol]]",
    "preview": "# ValueStrategy 价值策略认为低估值且基本面稳定的公司，最终会回归合理估值。常见选股标准是低 PE、低 PB、高股息、稳定盈利。 ## 典型指标",

    "id": "concepts/VolumePriceBreakout",
    "label": "VolumePriceBreakout",
    "type": "concept",
    "color": "#FF9800",
    "path": "wiki/concepts/VolumePriceBreakout.md",
    "markdown": "---\ntitle: \"VolumePriceBreakout\"\ntype: concept\ntags: [quantitative-trading, a-share, technical-analysis]\nsources: [a-share-quantitative-trading-strategies-guide]\nlast_updated: 2026-05-07\n---\n\n# VolumePriceBreakout\n\n量价突破策略的核心是：股价在关键压力位附近震荡后，如果伴随放量突破，说明新的资金愿意在更高价格成交，往往意味着新一轮上涨开始。\n\n## 常见信号\n- 放量突破前高、平台或箱体上沿\n- 成交量是过去 5-10 日均量的 1.5-3 倍\n- 换手率明显抬升\n- 分时强、收盘接近最高价\n\n## A 股中常见形态\n- 平台突破\n- 首板后强势换手\n- 趋势股二次突破\n- 主线板块内龙二、龙三补涨启动\n\n## 优缺点\n- 优点：买入逻辑明确、易于量化识别、与情绪周期结合效果好\n- 缺点：假突破很多、涨停封不住时容易被套、需要严格控制追高风险\n\n## 参见\n- [[TrendTracking]]\n- [[MomentumStrategy]]\n- [[TechnicalAnalysis]]",
    "preview": "# VolumePriceBreakout 量价突破策略的核心是：股价在关键压力位附近震荡后，如果伴随放量突破，说明新的资金愿意在更高价格成交，往往意味着新一轮上涨开始。 ## 常见信号",

    "markdown": "---\ntitle: \"HybridAIOptimizationModel\"\ntype: concept\ntags: [ai, optimization, hybrid, deep-learning, genetic-algorithm]\nsources: [wangxinjie-backend-developer-resume]\nlast_updated: 2026-05-08\n---\n\n# Hybrid AI Optimization Model (混合AI优化模型)\n\n混合AI优化模型指将[[DeepLearning|深度学习]]与[[GeneticAlgorithm|遗传算法]]等优化方法结合的技术路线。深度学习负责模式识别和预测，遗传算法负责全局搜索和优化。在[[慧公寓管理系统]]中用于动态宿舍分配：深度学习分析入住需求和优先级，遗传算法优化分配方案，实现空置率从30%降至10%。\n\n## Key Advantages\n- 深度学习捕捉复杂非线性关系\n- 遗传算法提供全局搜索能力，避免局部最优\n- 两者互补，适合约束优化+预测的混合场景\n\n## Connections\n- [[慧公寓管理系统]] — 实际应用案例\n- [[DeepLearning]] — 模式识别组件\n- [[GeneticAlgorithm]] — 优化组件\n- [[SelfImprovingAI]] — 自我优化思想有相似之处",

    "markdown": "---\ntitle: \"Attention Is All You Need\"\ntype: entity\ntags: [paper, nlp, transformer]\nsources: ['overview', 'attention-is-all-you-need']\nlast_updated: 2026-04-30\n---\n\n# Attention Is All You Need\n\n**Attention Is All You Need** is a landmark research paper published by Vaswani et al. from Google Research in June 2017, which introduced the **Transformer** architecture. In the context of this wiki, it serves as one of two foundational sources and is the primary entity that catalyzed the modern large language model (LLM) revolution. The paper's central innovation was demonstrating that a neural network architecture relying *solely* on self-attention mechanisms—eliminating all recurrent and convolutional layers—could achieve state-of-the-art performance in machine translation tasks while being significantly more parallelizable and faster to train. This architectural choice addressed key limitations of prior sequence-to-sequence models, particularly their sequential processing constraints. The Transformer introduced key components including multi-head self-attention, positional encodings, and the encoder-decoder structure that later became the blueprint for nearly all subsequent LLMs. The paper's significance is underscored by its influence across the entire wiki knowledge graph: it defines the core technology underpinning [[intro-to-llms]] and establishes the technical lineage for all transformer-based systems discussed in the synthesis. Key actions associated with this entity include implementing the architecture for translation tasks, using its design patterns for scaling language models, and serving as the essential reference point for understanding modern NLP breakthroughs. The entity is also linked to [[Vaswani]] (the lead author) and [[Google]] (the research institution) through citations in its source material.",

    "id": "entities/A股市场",
    "label": "A股市场",

    "color": "#2196F3",
    "path": "wiki/entities/A股市场.md",
    "markdown": "---\ntitle: \"A股市场\"\ntype: entity\ntags: [a-share, stock-market, china]\nsources: [a-share-quantitative-trading-strategies-guide]\nlast_updated: 2026-05-08\n---\n\n[[A股市场]]（A-share market）是中国大陆的股票市场，以人民币计价，面向境内投资者和符合条件的境外投资者。与美股、期货、外汇等市场相比，A股有涨跌停制度、T+1交割、做空工具有限、题材轮动和政策驱动等鲜明特征。散户占比高，量价异动和板块扩散效应明显。\n\n## Key Characteristics\n- **涨跌停制度**：10%涨跌幅限制（ST股5%），很多策略因无法成交而失真\n- **T+1交割**：当日买入不能当日卖出，短线策略约束更强\n- **做空限制**：纯股票组合难以做市场中性\n- **政策驱动**：产业政策、货币政策和监管变化对行情影响巨大\n- **题材轮动**：板块和主题轮动特征明显，情绪对短中期收益影响大\n\n## Related to\n- [[MainFundSelectionSystem]] — 针对A股的主力选股系统\n- [[TrendTracking]] — 适用A股的量化策略\n- [[MomentumStrategy]] — A股动量策略特性\n- [[MoneyFlowStrategy]] — 特别适合A股的策略\n- [[SectorRotation]] — A股板块轮动特征",

    "markdown": "---\ntitle: \"EventDriven\"\ntype: entity\ntags: [strategy, event-driven, catalysts]\nsources: [a-share-quantitative-trading-strategies-guide]\nlast_updated: 2026-05-08\n---\n\n事件驱动策略（Event-Driven Strategy）利用某个\"事件\"带来的定价重估机会，如业绩超预期、重组、回购、政策刺激、指数纳入、分红送转等。\n\n## Common Events\n- 财报超预期\n- 业绩预增\n- 并购重组\n- 国企改革\n- 产业政策催化\n- 指数调仓\n\n## A股特点\nA股对政策、公告、情绪非常敏感，很多短中期机会是某个事件直接触发而非慢慢走出来。\n\n## Risks\n- 事件真假难辨\n- 消息兑现后容易高开低走\n- 回测难度大，事件数据清洗成本高",

    "markdown": "---\ntitle: \"GrowthStrategy\"\ntype: entity\ntags: [strategy, growth, fundamental]\nsources: [a-share-quantitative-trading-strategies-guide]\nlast_updated: 2026-05-08\n---\n\n成长策略（Growth Strategy）重视未来盈利扩张，愿意为高增长支付更高估值。核心是找\"高景气 + 高增长 + 增长可持续\"的公司。\n\n## Typical Indicators\n- 营收同比高增长\n- 净利润同比高增长\n- ROE改善\n- PEG合理\n- 行业景气度向上\n\n## A股常见应用\n- 新能源产业链\n- 半导体\n- AI算力\n- 高端制造\n- 医药创新",

    "id": "entities/HermesAgent",
    "label": "HermesAgent",

    "color": "#2196F3",
    "path": "wiki/entities/HermesAgent.md",
    "markdown": "---\ntitle: \"HermesAgent\"\ntype: entity\ntags: [ai-agent, open-source, hermes, nous-research]\nsources: [github-hermes-ecosystem]\nlast_updated: 2026-05-02\n---\n\n> **Disambiguation**: This page is about **Hermes Agent**, an AI Agent framework by [[NousResearch]]. For Meta's JavaScript engine also named Hermes, see [[HermesJSEngine]].\n\n## Overview\n\nHermes Agent 是由 NousResearch 开发的开源自我进化 AI Agent，GitHub 星标数 128,747，是当前最热门的 AI Agent 项目之一。口号：\"The agent that grows with you\"。它与 Meta 的 [[HermesJSEngine]]（React Native JS 引擎）是完全无关的项目，仅名称相同。\n\n## Core Features\n\n### 1. 自我学习闭环\n- 从复杂任务中自主创建技能（Skills）\n- 使用过程中持续改进技能\n- FTS5 全文搜索历史会话 + LLM 摘要实现跨会话回忆\n- Honcho 方言式用户建模，构建用户画像\n\n### 2. 多模型支持\n支持任意 LLM 提供商，一条命令切换：\n- Nous Portal、OpenRouter（200+ 模型）\n- NVIDIA NIM (Nemotron)、Xiaomi MiMo\n- z.ai/GLM、Kimi/Moonshot、MiniMax\n- Hugging Face、OpenAI、自定义端点\n\n### 3. 多平台接入\n- CLI（全功能 TUI）\n- Telegram、Discord、Slack、WhatsApp、Signal\n- 语音备忘录转录、跨平台对话连续性\n\n### 4. 调度自动化\n- 内置 cron 调度器\n- 支持自然语言描述任务\n- 每日报告、夜间备份、每周审计\n\n### 5. 子代理与并行化\n- 生成隔离子代理进行并行工作流\n- 通过 RPC 调用工具的 Python 脚本\n- 多步骤管道压缩为零上下文成本\n\n### 6. 多种运行环境\n六种终端后端：local、Docker、SSH、Daytona、Singularity、Modal\n\n## Technical Stack\n\n- **语言**：Python\n- **许可证**：MIT\n- **安装**：`curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | bash`\n- **支持平台**：Linux、macOS、WSL2、Android (Termux)\n\n## Ecosystem\n\n| 项目 | Stars | 说明 |\n|---|---|---|\n| hermes-webui | 5,299 | Web/手机端界面 |\n| hermes-web-ui | 3,261 | 多平台管理面板（Vue3） |\n| hermes-workspace | 2,837 | 原生 Web 工作区 |\n| hermes-agent-self-evolution | 2,675 | 自我进化框架（DSPy+GEPA） |\n| awesome-hermes-agent | 2,212 | 资源和技能列表 |\n| hermes-agent-orange-book | 3,444 | 中文橙皮书教程 |\n\n## Connections\n\n- [[NousResearch]] — 开发组织\n- [[AIAgent]] — 所属概念\n- [[SelfImprovingAI]] — 核心理念\n- [[OpenAI]] — 支持的模型提供商\n- [[AgentFrameworkComparison]] — 与其他 Agent 框架对比\n",

    "markdown": "---\ntitle: \"HermesJSEngine\"\ntype: entity\ntags: [javascript-engine, react-native, meta, mobile]\nsources: [github-hermes-ecosystem]\nlast_updated: 2026-05-02\n---\n\n> **Disambiguation**: This page is about **Hermes**, the JavaScript engine by [[Meta]] for [[ReactNative]]. For the AI Agent framework also named Hermes, see [[HermesAgent]].\n\n## Overview\n\nHermes 是由 Meta（Facebook）开发的 JavaScript 引擎，专为 React Native 优化。从 React Native 0.69.0 开始，Hermes 作为默认 JS 引擎与 React Native 捆绑发布（Bundled Hermes）。GitHub 星标数 11,017。它与 NousResearch 的 [[HermesAgent]]（AI Agent 框架）是完全无关的项目，仅名称相同。\n\n## Core Features\n\n### 1. AOT 编译优化\n- 提前编译 JavaScript 为紧凑字节码（bytecode）\n- 显著减少运行时解析和编译开销\n- 应用启动时间大幅缩短\n\n### 2. 性能优势\n- **启动时间**：相比 JavaScriptCore 大幅改善\n- **内存使用**：更低的内存占用\n- **应用体积**：更小的打包尺寸\n\n### 3. Bundled Hermes\n- 每个 React Native 版本都附带对应版本的 Hermes\n- 版本严格匹配，避免兼容性问题\n\n## Technical Details\n\n- **语言**：C++（引擎核心）+ JavaScript\n- **许可证**：MIT\n- **仓库**：github.com/facebook/hermes\n- **支持平台**：Android、iOS\n- **构建系统**：CMake\n\n## Usage\n\n```bash\n# React Native 默认启用，无需额外配置\nnpx react-native init MyApp\ncd MyApp && npx react-native run-android\n```\n\n## Connections\n\n- [[Meta]] — 开发公司\n- [[ReactNative]] — 目标运行平台\n",

    "markdown": "---\ntitle: \"LargeLanguageModels\"\ntype: entity\ntags: [llm, neural-network, transformer, language-model]\nsources: ['intro-to-llms']\nlast_updated: 2026-05-04\n---\n\n# LargeLanguageModels\n\nA **Large Language Model (LLM)** is a type of neural network model, typically based on the [[Transformer]] architecture, trained on massive text corpora to predict and generate human-like text. In the context of this wiki, an LLM is fundamentally a next-token predictor: given a sequence of tokens, it learns to predict the most probable next token(s) through autoregressive generation.\n\n## Emergent vs. Deliberately Trained Capabilities\n\nEarly LLMs exhibited **emergent abilities**—capabilities that appeared abruptly at certain scale thresholds, including in-context learning, translation, and code generation. However, modern models have moved beyond purely emergent properties:\n\n- **Chain-of-Thought (CoT)**: Models can be prompted to generate intermediate reasoning steps, drastically improving performance on mathematical and logical tasks. Introduced in \"Chain-of-Thought Prompting Elicits Reasoning in Large Language Models\" (Wei et al., 2022).\n- **Test-Time Compute**: Recent reasoning models (e.g., OpenAI's o-series) deliberately allocate additional computation at inference time to refine answers through internal reasoning chains, rather than relying solely on pre-trained weights.\n- **Tool Use**: Modern LLMs integrate with external tools (calculators, search engines, APIs) via function calling, extending their capabilities beyond static parametric knowledge.\n- **Multimodality**: GPT-4o, Gemini, and Claude 3 process not only text but also images, audio, and video, representing a shift from pure language modeling to unified multimodal reasoning.\n\n## Scaling Laws\n\nScaling laws empirically demonstrate that model capability improves predictably with increases in compute, training data, and parameter count. Key milestones include:\n- **Kaplan et al. (2020)**: Established power-law relationships between loss and model size/data/compute.\n- **Chinchilla (2022)**: Demonstrated that many models were under-trained; compute-optimal training requires balancing model size with training token count.\n\n## Architectural Variants\n\n- **Decoder-only**: [[GPT]] series, [[LLaMA]], Claude — autoregressive generation, dominant for generative tasks.\n- **Encoder-only**: [[BERT]], RoBERTa — bidirectional understanding, prevalent in classification and retrieval.\n- **Encoder-decoder**: [[T5]], BART — structured for translation and summarization.\n\n## Connections\n- [[Transformer]] — core architecture\n- [[GPT]] — influential decoder-only LLM family\n- [[BERT]] — influential encoder-only LLM\n- [[AttentionMechanism]] — key operation enabling long-range dependencies\n- [[AIAgent]] — LLMs serve as the cognitive backbone of modern agents\n- [[StateSpaceModels]] — emerging alternatives to Transformer-based LLMs\n",
    "preview": "# LargeLanguageModels A **Large Language Model (LLM)** is a type of neural network model, typically based on the [[Transformer]] architecture, trained on massive text corpora to predict and generate human-like text. In t",

    "markdown": "---\ntitle: \"Latte\"\ntype: entity\ntags: [claude-code, fork, ai-agent, cli]\nsources: [latte-claude-code-fork]\nlast_updated: 2026-05-08\n---\n\n# Latte\n\n**Latte** 是 [[Anthropic]] [[ClaudeCode]] CLI（版本 2.1.90）的一个可构建分支（fork），由 wxj-1019 在 GitHub（https://github.com/wxj-1019/latte-code）上维护。核心差异包括移除遥测、移除安全硬编码守卫、解锁 54 个实验性功能、内置中文界面与多模型支持。\n\n## Key Facts\n\n- **运行时**：[[Bun]] >= 1.3.11\n- **语言**：TypeScript（strict: false）\n- **终端 UI**：React 19 + [[Ink]]\n- **CLI 解析**：Commander.js\n- **Schema 验证**：Zod v4\n- **LLM SDK**：`@anthropic-ai/sdk` 及 Bedrock/Vertex/Foundry 变体\n- **MCP 协议**：`@modelcontextprotocol/sdk`\n- **Feature Flag**：编译时死代码消除（DCE）\n- **发布**：NPM 平台分包（`@zenjiro-latte/latte-code`）\n\n## 核心架构\n\n查询流水线：`QueryEngine.submitMessage()` → 构建 System Prompt → 处理用户输入 → `query()` 循环（流式调用 API、解析 tool_use、权限检查、执行 Tool、循环直至 stop_reason）→ Auto Compact → 输出\n\n## 支持的模型提供商\n\n- [[Anthropic]]（默认）\n- [[OpenAI]] 兼容（[[DeepSeek]]、Kimi、GLM、[[Qwen]]、[[Ollama]] 等）\n- AWS Bedrock\n- Google Vertex\n- Anthropic Foundry\n\n## Connections\n\n- [[Claude]] — 上游 API 提供商\n- [[Anthropic]] — 上游项目开发者\n- [[HermesAgent]] — 同为 AI 工具，但侧重自我进化 Agent\n- [[ClaudeCode]] — 上游基础项目\n",

    "id": "entities/LLaMA",

    "markdown": "---\ntitle: \"LLaMA\"\ntype: entity\ntags: ['llm', 'meta', 'open-source', 'foundation-model']\nsources: ['overview', 'foundation-models-overview']\nlast_updated: 2026-05-04\n---\n\n# LLaMA\n\nLLaMA (Large Language Model Meta AI) is a family of large language models developed by [[Meta]], designed as a research-focused alternative to proprietary closed-source models like [[OpenAI]]'s [[GPT]] series and [[Google]]'s Gemini. Architecturally, LLaMA is a decoder-only [[Transformer]]-based model using self-attention mechanisms as introduced in [[attention-is-all-you-need]].\n\n## Model Versions\n\n### LLaMA 1 (2023)\n- Released with model weights under a non-commercial academic license.\n- Parameter sizes: 7B, 13B, 33B, 65B.\n- Sparked a wave of open-source fine-tuned variants such as Alpaca and Vicuna.\n\n### LLaMA 2 (2023)\n- Released under a more permissive commercial license.\n- Introduced Grouped-Query Attention (GQA) to improve inference speed.\n- Parameter sizes: 7B, 13B, 70B, plus a code-specialized Code LLaMA variant.\n\n### LLaMA 3 (2024)\n- Significantly expanded training data and context window.\n- Improved reasoning, coding, and multilingual capabilities.\n- Parameter sizes: 8B, 70B, and 405B (the largest open-weight model at release).\n\n### Future Directions\n- Meta has signaled continued investment in open-weight models, with expectations around Mixture-of-Experts (MoE) architectures, expanded multimodal support, and longer context windows in subsequent releases. Specific details beyond LLaMA 3 should be sourced from official Meta AI announcements.\n\n## Significance\n\nBy releasing model weights, Meta democratized access to powerful LLM capabilities, enabling researchers, startups, and independent developers to fine-tune, study, and deploy high-performing models without proprietary API costs. This open-weight strategy directly challenged the dominance of closed-source foundation models and catalyzed the broader open-source AI ecosystem.\n\n## Connections\n- [[Meta]] — developing organization\n- [[GPT]] — primary closed-source competitor family\n- [[Transformer]] — core architecture\n- [[AttentionMechanism]] — foundational operation\n",

    "markdown": "---\ntitle: \"MeanReversion\"\ntype: entity\ntags: [strategy, mean-reversion, contrarian]\nsources: [a-share-quantitative-trading-strategies-guide]\nlast_updated: 2026-05-08\n---\n\n均值回归策略（Mean Reversion）认为价格短期偏离合理区间后，未来有较大概率向均值回归。常见做法是买超跌、卖超涨。\n\n## Common Signals\n- RSI低于20或30\n- 股价远离布林带下轨后出现缩量企稳\n- 短期跌幅过大，但基本面未明显恶化\n\n## A股实战提醒\n必须加\"基本面未坏\"和\"没有重大利空\"过滤，否则容易把趋势性下跌误判为超跌机会。\n\n## Connection\n- [[VolumePriceBreakout]] — 对立逻辑但可互补\n- [[ValueStrategy]] — 基本面过滤关联",
    "preview": "均值回归策略（Mean Reversion）认为价格短期偏离合理区间后，未来有较大概率向均值回归。常见做法是买超跌、卖超涨。 ## Common Signals - RSI低于20或30",

    "id": "entities/MomentumStrategy",

    "color": "#2196F3",
    "path": "wiki/entities/MomentumStrategy.md",
    "markdown": "---\ntitle: \"MomentumStrategy\"\ntype: entity\ntags: [strategy, momentum, cross-section]\nsources: [a-share-quantitative-trading-strategies-guide]\nlast_updated: 2026-05-08\n---\n\n动量策略（Momentum Strategy）强调\"过去一段时间涨得好的，未来一段时间可能继续强\"。它和[[TrendTracking]]很像，但更偏向截面比较，在同一批股票中找相对最强的。\n\n## Common Signals\n- 过去20日、60日、120日涨幅排名靠前\n- 相对沪深300、中证1000的超额收益领先\n- 强势股回调后重新放量上行\n\n## A股特点\nA股有明显风格外溢和情绪扩散效应，龙头先涨、板块跟涨的情况经常发生，因此动量策略在热点市场中经常有效。\n\n## Connection\n- [[TrendTracking]] — 战略关联\n- [[SectorRotation]] — 可结合板块识别\n- [[TrendMomentum]] — 可与趋势组合使用",
    "preview": "动量策略（Momentum Strategy）强调\"过去一段时间涨得好的，未来一段时间可能继续强\"。它和[[TrendTracking]]很像，但更偏向截面比较，在同一批股票中找相对最强的。 ## Common Signals - 过去20日、60日、120日涨幅排名靠前",

    "id": "entities/MoneyFlowStrategy",
    "label": "MoneyFlowStrategy",
    "type": "entity",
    "color": "#2196F3",
    "path": "wiki/entities/MoneyFlowStrategy.md",
    "markdown": "---\ntitle: \"MoneyFlowStrategy\"\ntype: entity\ntags: [strategy, money-flow, quantitative-trading]\nsources: [a-share-quantitative-trading-strategies-guide]\nlast_updated: 2026-05-08\n---\n\n主力资金流入策略（Money Flow Strategy）是一种跟踪大资金流向的量化交易方法。其核心逻辑是：如果主力资金持续净流入，而股价涨幅尚未完全反映，后续可能还有上行动力。\n\n## Key Signals\n- 主力净流入连续多日为正\n- 单日大额净流入，且占成交额比例较高\n- 股价涨幅不大，但量能持续放大\n- 大单、超大单资金流明显优于中小单\n\n## A股适用性\nA股是典型的资金驱动市场。题材启动初期，很多股票会先出现资金异动，再逐渐体现在价格上。\n\n## Best Practices\n- 不应只看\"单日净流入金额\"，应综合关注连续性、占成交额比例、股价位置、板块共振\n- 可与[[TrendTracking]]和[[SectorRotation]]结合使用\n\n## Connection\n- [[MainFundSelectionSystem]] — 作为四种优先工程化策略之一\n- [[WencaiAPI]] — 数据来源\n- [[Tushare]] — 数据来源",
    "preview": "主力资金流入策略（Money Flow Strategy）是一种跟踪大资金流向的量化交易方法。其核心逻辑是：如果主力资金持续净流入，而股价涨幅尚未完全反映，后续可能还有上行动力。 ## Key Signals - 主力净流入连续多日为正",

    "id": "entities/MultiFactorSelection",
    "label": "MultiFactorSelection",
    "type": "entity",
    "color": "#2196F3",
    "path": "wiki/entities/MultiFactorSelection.md",
    "markdown": "---\ntitle: \"MultiFactorSelection\"\ntype: entity\ntags: [strategy, multi-factor, quantitative-trading]\nsources: [a-share-quantitative-trading-strategies-guide]\nlast_updated: 2026-05-08\n---\n\n多因子选股策略（Multi-Factor Selection）是一种同时从估值、成长、质量、动量、波动率、资金流等多个维度给股票打分，再综合排序选股的量化方法。\n\n## Common Factors\n- **估值因子**：PE、PB、PS、股息率\n- **成长因子**：营收增速、利润增速、ROE提升\n- **质量因子**：现金流、负债率、毛利率\n- **动量因子**：近20/60/120日收益\n- **交易因子**：换手率、量比、资金流\n- **风险因子**：波动率、最大回撤、Beta\n\n## A股落地重点\n需加入硬过滤：剔除ST、停牌、涨跌停、流动性不足、次新股。\n\n## Connection\n- [[MainFundSelectionSystem]] — 作为四种优先工程化策略和\"统一底座\"\n- [[QuantitativeAnalysis]] — 与量化预评分系统战略一致\n- [[AIAgent]] — 可作为AI推荐层的底层框架",

    "id": "entities/NousResearch",
    "label": "NousResearch",
    "type": "entity",
    "color": "#2196F3",
    "path": "wiki/entities/NousResearch.md",
    "markdown": "---\ntitle: \"NousResearch\"\ntype: entity\ntags: [organization, ai-research, open-source]\nsources: [github-hermes-ecosystem]\nlast_updated: 2026-05-04\n---\n\n## Overview\n\nNousResearch is a decentralized, open-source AI research collective known for pushing the boundaries of autonomous AI agents and openly shared model fine-tunes. Unlike traditional corporate labs, NousResearch operates as a distributed community of researchers, engineers, and artists collaborating on public infrastructure for AI. Its work spans from agent frameworks to fine-tuned language models and synthetic data generation.\n\n## Key Projects\n\n### Agent & Infrastructure\n- **[[HermesAgent]]** — 自我进化的 AI Agent 框架，支持多种 LLM 提供商与多平台部署\n- **hermes-agent-self-evolution** — 基于 DSPy + GEPA 的进化式自我改进系统\n\n### Model Fine-Tunes\n- **Nous-Hermes** — A family of fine-tuned LLaMA and Mistral models optimized for general instruction following and reasoning. Early releases (Nous-Hermes 1, 2) demonstrated that small, open models could match larger proprietary counterparts with high-quality data curation.\n- **Capybara** — A series of conversational fine-tunes focused on roleplay, creative writing, and long-context coherence.\n- **Yi-Coder / Code models** — Specialized fine-tunes for code generation and software engineering tasks.\n\n### Research Contributions\n- **Synthetic Data Pipelines** — NousResearch pioneered the use of synthetic data generation for model fine-tuning, showing that carefully curated synthetic dialogues can outperform hand-collected human datasets.\n- **GEPA (Gradient-free Evolutionary Prompt Adjustment)** — An evolutionary algorithm for optimizing prompts without backpropagation, enabling agents to improve their own instructions over time.\n\n## Philosophy\n\n- **Open Weights**: All major model releases include downloadable weights and training recipes, enabling full reproducibility and downstream customization.\n- **Model Agnosticism**: Tools are designed to work across providers (OpenAI, Anthropic, local models via Hugging Face, etc.), preventing vendor lock-in.\n- **Self-Improvement as Default**: The organization views autonomous learning and skill creation as essential properties of next-generation AI systems, not optional add-ons.\n- **Decentralized Collaboration**: Research happens in public Discord servers and open GitHub repositories, with contributions from a global community rather than a centralized lab structure.\n\n## Connections\n\n- [[HermesAgent]] — 核心项目\n- [[AIAgent]] — 所属领域\n- [[SelfImprovingAI]] — 研究理念\n- [[OpenAI]] — 支持的 LLM 提供商之一\n- [[Meta]] — LLaMA 系列模型的来源（Nous-Hermes 基于 LLaMA）\n",
    "preview": "## Overview NousResearch is a decentralized, open-source AI research collective known for pushing the boundaries of autonomous AI agents and openly shared model fine-tunes. Unlike traditional corporate labs, NousResearch",

    "markdown": "---\ntitle: \"o1\"\ntype: entity\ntags: [llm, reasoning, inference-scaling, openai]\nsources: ['things-we-learned-about-llms-in-2024.md']\n---\n\n# o1\n\n`o1` refers to OpenAI’s series of large language models introduced in 2024 that pioneer a new paradigm known as **inference-scaling** (or \"test-time compute\") reasoning. Unlike previous models (such as GPT-4) which generate responses in a single forward pass, o1 models are designed to “think” before responding by internally generating chains of reasoning, self-correcting, and exploring multiple solution paths during inference. This approach dramatically improves performance on complex mathematical, scientific, and coding tasks—at the cost of significantly higher computational overhead and latency. In the context of this wiki, o1 is most notable for representing a major architectural breakthrough that breaks the earlier scaling laws (which focused solely on pre-training compute), and for inspiring a wave of open-source imitators such as [[DeepSeekR1]]. The model’s emergence is frequently cited alongside DeepSeek R1 as a key milestone in 2024’s LLM landscape, and its release triggered widespread interest in inference-time optimization techniques, chain-of-thought prompting, and the trade-offs between raw intelligence and practical usability.",

    "markdown": "---\ntitle: \"QuantitativeAnalysis\"\ntype: entity\ntags: [quant, finance, stock-selection]\nsources: [main-fund-selection-system-analysis]\nlast_updated: 2026-05-07\n---\n\n# QuantitativeAnalysis\n\n系统性量化分析方法论在金融选股中的应用。在[[main-fund-selection-system-analysis|主力选股系统]]中，量化预评分（Quant Scorer）是AI分析前的关键过滤层，从资金强度、量价配合、基本面质量、估值安全四个维度对股票进行客观评分，并结合策略自适应权重和公式Overlay，为AI分析师提供排名基准和候选池截断。",

    "markdown": "---\ntitle: \"T5\"\ntype: entity\ntags: []\nsources: ['overview', 'foundation-models-overview']\nlast_updated: 2026-04-30\n---\n\n# T5\n\nT5, or Text-to-Text Transfer Transformer, is a family of encoder-decoder models developed by [[Google]]. Its defining innovation is reformulating all natural language processing (NLP) tasks—including translation, summarization, question answering, and classification—into a unified text-to-text framework, where both the input and output are always text strings. This allows a single model architecture and training objective to be applied across diverse tasks by simply prefixing the input with a task-specific cue (e.g., “translate English to German: …”). T5 is a key example of a foundation model built upon the [[Transformer]] architecture, leveraging the [[AttentionMechanism|self-attention]] mechanism introduced in the seminal paper [[attention-is-all-you-need]]. The model demonstrated that a unified approach, combined with a large-scale “Colossal Clean Crawled Corpus” (C4), could achieve state-of-the-art performance on many benchmarks, and its design philosophy has influenced subsequent large language models by emphasizing the importance of transfer learning and task-agnostic pretraining.",

    "markdown": "---\ntitle: \"TechnicalAnalysis\"\ntype: entity\ntags: [trading, finance, analysis, market-patterns]\nsources: [Investopedia, StockCharts, Market Wizards]\n---\n\n# TechnicalAnalysis\n\n**TechnicalAnalysis** is a methodology for evaluating and forecasting the direction of prices in financial markets—including stocks, cryptocurrencies, commodities, and forex—through the study of historical market data, primarily price and volume. In the context of this wiki, TechnicalAnalysis stands in contrast to fundamental analysis, focusing not on an asset’s intrinsic value but on the patterns, trends, and statistical indicators derived from market activity itself. Its main significance lies in its ability to identify recurring behavioral patterns of market participants (e.g., support and resistance levels, head-and-shoulders formations, moving average crossovers) that may signal future price movements. Practitioners of TechnicalAnalysis—often called technical analysts or chartists—use a wide array of tools, from simple trendlines and candlestick charts to complex oscillators like the Relative Strength Index (RSI) and MACD. Actions associated with TechnicalAnalysis include scanning for breakout patterns, backtesting trading strategies on historical data, and applying risk management rules such as stop-loss orders based on technical levels. The discipline is prevalent among short-term traders, algorithmic trading systems, and even longer-term investors who use it for entry and exit timing. While highly subjective and often criticized for its self-fulfilling prophecies, TechnicalAnalysis remains a cornerstone of active trading and quantitative finance, with extensive libraries of indicators available in platforms like TradingView, MetaTrader, and Python’s TA-Lib.",

    "label": "TrendMomentum",
    "type": "entity",
    "color": "#2196F3",
    "path": "wiki/entities/TrendMomentum.md",
    "markdown": "---\ntitle: \"TrendMomentum\"\ntype: entity\ntags: [strategy, trend, momentum, composite]\nsources: [a-share-quantitative-trading-strategies-guide]\nlast_updated: 2026-05-08\n---\n\n趋势+动量复合策略（Trend + Momentum Composite）是将[[TrendTracking]]和[[MomentumStrategy]]结合的策略。趋势提供方向判断（均线排列、MACD金叉等），动量提供相对强度筛选（截面排名筛选）。\n\n## Why Combine\n- 趋势跟踪解决\"方向\"问题\n- 动量解决\"哪个更强\"的问题\n- 二者结合可以减少只看资金流被假信号干扰的问题\n- 信号稳定，回测相对容易\n\n## A股适用性\n特别适合A股的板块轮动和热点扩散特征，能较好捕捉主线板块中的强势股。\n\n## Connection\n- [[MainFundSelectionSystem]] — 作为四种优先工程化策略之一\n- [[SectorRotation]] — 可与板块轮动叠加使用\n- [[MoneyFlowStrategy]] — 可与资金流策略组合",
    "preview": "趋势+动量复合策略（Trend + Momentum Composite）是将[[TrendTracking]]和[[MomentumStrategy]]结合的策略。趋势提供方向判断（均线排列、MACD金叉等），动量提供相对强度筛选（截面排名筛选）。 ## Why Combine - 趋势跟踪解决\"方向\"问题",

  {
    "id": "entities/TrendTracking",
    "label": "TrendTracking",
    "type": "entity",
    "color": "#2196F3",
    "path": "wiki/entities/TrendTracking.md",
    "markdown": "---\ntitle: \"TrendTracking\"\ntype: entity\ntags: [strategy, trend, technical-analysis]\nsources: [a-share-quantitative-trading-strategies-guide]\nlast_updated: 2026-05-08\n---\n\n趋势跟踪策略（Trend Tracking）是一种跟随上涨趋势的量化交易策略。其本质是：股价一旦形成上升趋势，往往不会立刻结束，而是会沿着趋势持续一段时间。策略不去预测底部，而是在趋势已经明确后跟随。\n\n## Common Signals\n- 5日均线 > 20日均线 > 60日均线\n- 股价站上60日或120日均线\n- MACD金叉且位于零轴上方\n- 创阶段新高\n\n## A股适用性\nA股一旦出现主线板块，龙头和核心趋势股经常有明显\"沿均线上行\"特征，尤其在机构抱团和行业景气上行阶段。\n\n## Connection\n- [[MomentumStrategy]] — 战略关联\n- [[MainFundSelectionSystem]] — 与系统中\"温和回调多头\"策略相关\n- [[TrendMomentum]] — 可与动量组合使用",
    "preview": "趋势跟踪策略（Trend Tracking）是一种跟随上涨趋势的量化交易策略。其本质是：股价一旦形成上升趋势，往往不会立刻结束，而是会沿着趋势持续一段时间。策略不去预测底部，而是在趋势已经明确后跟随。 ## Common Signals - 5日均线 > 20日均线 > 60日均线",
    "links": [

      "TrendMomentum"

    "markdown": "---\ntitle: \"ValueStrategy\"\ntype: entity\ntags: [strategy, value, fundamental]\nsources: [a-share-quantitative-trading-strategies-guide]\nlast_updated: 2026-05-08\n---\n\n价值策略（Value Strategy）认为低估值且基本面稳定的公司，最终会回归合理估值。常见选股标准是低PE、低PB、高股息、稳定盈利。\n\n## Typical Indicators\n- PE低于行业中位数\n- PB偏低\n- ROE不差\n- 自由现金流稳定\n- 分红率较高\n\n## A股表现\n价值风格在经济预期偏弱、市场强调安全边际时更占优，如银行、煤炭、电力、运营商、公用事业等传统高股息领域。\n\n## Connection\n- [[HighDividendLowVol]] — 策略关联\n- [[QualityStrategy]] — 质量过滤可避免\"便宜但差\"",

    "path": "wiki/entities/VolumePriceBreakout.md",
    "markdown": "---\ntitle: \"VolumePriceBreakout\"\ntype: entity\ntags: [strategy, breakout, volume]\nsources: [a-share-quantitative-trading-strategies-guide]\nlast_updated: 2026-05-08\n---\n\n量价突破策略（Volume-Price Breakout）的核心是：股价在关键压力位附近震荡后，如果伴随放量突破，说明新的资金愿意在更高价格成交，往往意味着新一轮上涨开始。\n\n## Common Signals\n- 放量突破前高、平台或箱体上沿\n- 成交量是过去5-10日均量的1.5-3倍\n- 换手率明显抬升\n- 分时强、收盘接近最高价\n\n## A股常见形态\n- 平台突破\n- 首板后强势换手\n- 趋势股二次突破\n- 主线板块内龙二、龙三补涨启动\n\n## Connection\n- [[TrendTracking]] — 突破确认趋势\n- [[AIAgent]] — 可用于AI识别突破形态",
    "preview": "量价突破策略（Volume-Price Breakout）的核心是：股价在关键压力位附近震荡后，如果伴随放量突破，说明新的资金愿意在更高价格成交，往往意味着新一轮上涨开始。 ## Common Signals - 放量突破前高、平台或箱体上沿",

  {
    "id": "sources/a-share-quantitative-trading-strategies-guide",
    "label": "A股常见量化交易策略指南",

    "path": "wiki/sources/a-share-quantitative-trading-strategies-guide.md",
    "markdown": "---\ntitle: \"A股常见量化交易策略指南\"\ntype: source\ntags: [a-share, quantitative-trading, strategy-guide, system-design]\ndate: 2026-05-08\nsource_file: raw/uploads/A股常见量化交易策略指南.md\n---\n\n## Summary\n\n本文档全面梳理了适合[[A股市场]]的14种常见量化交易策略，包括[[TrendTracking|趋势跟踪]]、[[MomentumStrategy|动量]]、[[MeanReversion|均值回归]]、[[VolumePriceBreakout|量价突破]]、[[MoneyFlowStrategy|资金流]]、[[SectorRotation|板块轮动]]、[[MultiFactorSelection|多因子选股]]、[[ValueStrategy|价值]]、[[GrowthStrategy|成长]]、[[QualityStrategy|质量]]、[[HighDividendLowVol|高股息低波]]、[[EventDriven|事件驱动]]、[[StatisticalArbitrage|统计套利/配对交易]]和[[ConvertibleBondArbitrage|可转债套利]]。文档从A股独特市场特征（涨跌停、T+1、做空限制、政策驱动、题材轮动）出发，分析了每种策略的核心逻辑、常见信号、优缺点和实战落地要点，并为当前主力选股系统提供了四种最适合优先工程化的策略类型：[[MoneyFlowStrategy|主力资金流入]]、[[SectorRotation|板块轮动]]、[[TrendMomentum|趋势+动量复合]]和[[MultiFactorSelection|多因子评分]]。\n\n## Key Claims\n\n- A股量化策略需要单独理解，涨跌停制度、T+1交割、做空限制、题材轮动和政策驱动特征显著影响策略有效性\n- 每种策略有各自最适合的市场状态：趋势跟踪适合单边上涨和结构性牛市，均值回归适合震荡市，动量策略适合赚钱效应明显的热点扩散阶段\n- 最常见的策略失败原因包括：忽略成交可行性、未来函数、过拟合、风格切换失效、忽略交易成本和仓位管理\n- 最适合当前[[AIAgent|AI智能选股系统]]优先工程化的四类策略是：主力资金流入策略、板块轮动策略、趋势+动量复合策略、多因子评分策略\n- 最稳妥的路线是采用\"多因子底座 + A股特色信号（资金流、板块、情绪）+ 严格交易风控\"的组合架构\n\n## Key Quotes\n\n> \"A股量化策略并不只是几个名词，它们背后分别代表不同的赚钱机制：趋势和动量赚的是'强者恒强'，均值回归赚的是'短期偏离后的修复'，资金流和板块轮动赚的是'资金博弈和主线扩散'\"\n\n> \"在A股做量化，不能只学'通用策略名字'，更要理解：这个策略靠什么赚钱、这个策略在A股为什么有效、这个策略最怕什么市场环境、这个策略落地时要加什么风控\"\n\n> \"只看收益率，不看成交可行性\" — 最常见的策略失败原因之首\n\n## Connections\n\n- [[AIAgent]] — 主力选股系统的AI分析层可利用本指南中的策略框架\n- [[QuantitativeAnalysis]] — 多因子评分策略与量化预评分系统直接相关\n- [[MainFundSelectionSystem|主力选股系统]] — 本指南中的四种优先策略直接服务于主力选股系统的策略体系\n- [[RiskManagement]] — 每种策略特有的风控参数和失败原因与系统风控设计相关\n- [[DataPipeline]] — 资金流数据和板块数据的获取需求与数据获取层相关\n- [[TrendTracking]] — 趋势跟踪策略与系统中\"温和回调多头\"策略相关\n- [[SectorRotation]] — 板块轮动策略与系统中\"板块轮动\"策略直接对应\n- [[MultiFactorSelection]] — 多因子评分与系统的量化预评分体系一致\n- [[Backtesting]] — 多策略的回测框架与系统的自动回测验证机制互补\n- [[WencaiAPI]] — 资金流数据的来源之一\n- [[Tushare]] — 技术指标计算的数据来源\n\n## Contradictions\n\n- 本文档与[[main-fund-selection-system-analysis|主力选股系统整体分析文档]]无直接矛盾，但本文档提供了更完整的策略理论框架，可以丰富主力选股系统的策略描述和风险说明\n- 本文档强调板块轮动策略和趋势+动量复合策略，这与主力选股系统已内置的7种策略体系互补，不冲突",
    "preview": "## Summary 本文档全面梳理了适合[[A股市场]]的14种常见量化交易策略，包括[[TrendTracking|趋势跟踪]]、[[MomentumStrategy|动量]]、[[MeanReversion|均值回归]]、[[VolumePriceBreakout|量价突破]]、[[MoneyFlowStrategy|资金流]]、[[SectorRotation|板块轮动]]、[[MultiFactorSelection|多因子选",

    "markdown": "---\ntitle: \"Attention Is All You Need\"\ntype: source\ntags: [paper, nlp, transformer]\ndate: 2017-06-12\nsource_file: raw/attention-is-all-you-need.pdf\n---\n\n## Summary\nThe seminal paper by [[Vaswani]] et al. from [[Google]] Research introducing the [[Transformer]] architecture, which replaced recurrent and convolutional layers with purely attention-based mechanisms.\n\n## Key Claims\n- The [[Transformer]] achieves state-of-the-art translation quality while being more parallelizable and requiring significantly less training time.\n- Self-attention layers are faster than recurrent layers when the sequence length is smaller than the representation dimensionality.\n- The proposed architecture generalizes well to other tasks beyond machine translation.\n\n## Key Quotes\n> \"We propose a new simple network architecture, the Transformer, based solely on attention mechanisms, dispensing with recurrence and convolutions entirely.\"\n\n> \"The Transformer is the first transduction model based entirely on self-attention to compute representations of its input and output without using sequence-aligned RNNs or convolution.\"\n\n## Connections\n- [[Transformer]] — architecture introduced in this paper\n- [[AttentionMechanism]] — core concept\n- [[Google]] — research institution\n- [[Vaswani]] — first author\n\n## Contradictions\n- Earlier work by [[Bahdanau]] proposed attention for RNNs; this paper shows attention alone is sufficient.\n",

    "markdown": "---\ntitle: \"GitHub Hermes 生态系统综述\"\ntype: source\ntags: [hermes, ai-agent, javascript-engine, github, open-source]\ndate: 2026-05-02\nsource_file: raw/github-hermes-ecosystem.md\n---\n\n## Summary\n\nGitHub 上名为 \"Hermes\" 的项目横跨多个领域：最热门的是 NousResearch 开源的 **Hermes Agent**（⭐128,747），一个自我进化的 AI Agent 框架；其次是 Meta/Facebook 的 **Hermes JavaScript 引擎**（⭐11,017），专为 React Native 优化。此外还有 Hermes WebUI、Hermes Workspace 等生态项目，以及 HashiCorp 的文档管理系统和 Cornell 的 RAG 优化框架等同名项目。\n\n## Key Claims\n\n- Hermes Agent 是目前 GitHub 上星标数最高的 AI Agent 项目之一（128K+ stars），由 Nous Research 开发\n- Hermes Agent 的核心理念是\"自我改进闭环\"：从经验中创建技能、使用中改进技能、跨会话搜索历史、构建用户模型\n- Hermes JS 引擎是 React Native 的默认 JavaScript 引擎，采用 AOT 编译和紧凑字节码优化启动性能\n- Hermes 生态系统包含 WebUI、Workspace、Self-Evolution、Orange Book 等多个子项目\n\n## Key Quotes\n\n> \"The self-improving AI agent built by Nous Research. It's the only agent with a built-in learning loop.\" — Hermes Agent README\n\n> \"Hermes is a JavaScript engine optimized for fast start-up of React Native apps. It features ahead-of-time static optimization and compact bytecode.\" — Facebook/Hermes README\n\n> \"The agent that grows with you\" — Hermes Agent Slogan\n\n## Connections\n\n- [[NousResearch]] — Hermes Agent 的开发组织，专注于开源 AI 研究\n- [[Meta]] — Hermes JavaScript 引擎的开发公司，用于 React Native\n- [[HermesAgent]] — 最热门的 Hermes 项目，自我进化 AI Agent\n- [[HermesJSEngine]] — React Native 优化的 JavaScript 引擎\n- [[AIAgent]] — 核心概念，Hermes Agent 的本质\n- [[ReactNative]] — Hermes JS 引擎的应用平台\n- [[SelfImprovingAI]] — Hermes Agent 的核心理念\n\n## Contradictions\n\n- Hermes Agent 和 Hermes JS Engine 名称相同但完全无关，分别属于 AI 和移动开发两个不同领域\n",

    "id": "sources/latte-claude-code-fork",

    "type": "source",
    "color": "#4CAF50",
    "path": "wiki/sources/latte-claude-code-fork.md",
    "markdown": "---\ntitle: \"Latte — Claude Code 可构建分支 (AGENTS.md)\"\ntype: source\ntags: [claude-code, fork, latte, bun, typescript, ai-agent]\ndate: 2026-05-08\nsource_file: raw/uploads/AGENTS.md\n---\n\n## Summary\n\nAGENTS.md 是 **latte** 项目的操作指引文件。latte 是 [[Anthropic]] [[Claude]] Code CLI（版本 2.1.90）的一个可构建分支（fork），由用户 wxj-1019 维护。核心差异包括：移除遥测、移除安全硬编码守卫、解锁 54 个实验性功能、内置中文界面与多模型支持（通过 [[OpenAI]] 兼容适配器接入 [[DeepSeek]]、Kimi、GLM、[[Qwen]]、[[Ollama]] 等第三方模型）。项目使用 [[Bun]] 运行时（>=1.3.11）和 TypeScript 开发，基于 React 19 + [[Ink]] 构建终端 UI，采用 Feature Flag 编译时死代码消除（DCE）机制。\n\n## Key Claims\n\n- Latte 移除了所有外部分析、崩溃报告和会话指纹采集，并提供更开放的控制权\n- 通过编译时特性开关解锁 54 个上游默认禁用的实验性功能\n- 内置中文交互支持，可通过 OpenAI 兼容适配器接入 [[DeepSeek]]、Kimi、GLM、[[Qwen]]、[[Ollama]] 等第三方模型\n- 使用 Bun 作为运行时和构建工具，采用 `bun build --compile` 打包为单个可执行文件\n- 构建时 Feature Flag 通过 `feature()` 函数实现死代码消除（DCE），未启用功能在编译时被移除\n- 查询流水线核心：`QueryEngine.submitMessage()` → 构建 System Prompt → 处理用户输入 → `query()` 循环（流式调用 API、解析 tool_use、权限检查、执行 Tool、循环直至 stop_reason）→ Auto Compact → 输出\n- 支持多种模型提供商：[[Anthropic]]（默认）、[[OpenAI]] 兼容、AWS Bedrock、Google Vertex、Anthropic Foundry\n- 项目无自动化测试套件，完全依赖手动测试\n- 采用 NPM 平台分包发布模式（`@zenjiro-latte/latte-code`），与 esbuild、prisma 等行业标准一致\n- 源自 [[Anthropic]] 的 [[ClaudeCode]] 项目（https://docs.anthropic.com/en/docs/claude-code）\n\n## Key Quotes\n\n> \"latte 是 Anthropic Claude Code CLI 的一个可构建分支（fork）\"\n\n> \"移除遥测：去除了所有外部分析、崩溃报告和会话指纹采集。\"\n\n> \"Feature Flag 通过 bun:bundle 的 feature() 函数实现编译时死代码消除（DCE）。未启用的 feature 会在构建时被整体移除。\"\n\n## Connections\n\n- [[Claude]] — 上游项目 Claude Code CLI 的创造者\n- [[Anthropic]] — 上游项目的开发者\n- [[Bun]] — 核心运行时和构建工具\n- [[OpenAI]] — 兼容适配层，支持接入外部模型\n- [[DeepSeek]] — 通过 OpenAI 兼容适配支持的第三方模型提供商\n- [[Qwen]] — 通过 OpenAI 兼容适配支持的第三方模型提供商\n- [[Ollama]] — 本地模型运行平台，通过 OpenAI 兼容适配支持\n- [[Ink]] — 终端 UI 框架（React for CLI）\n- [[MCP]] — Model Context Protocol，通过 `@modelcontextprotocol/sdk` 支持\n- [[TypeScript]] — 项目语言\n- [[React]] — 终端 UI 层使用的框架\n- [[HermesAgent]] — 同为 AI Agent 类工具，但 latte 更偏向 CLI 编程助手而非自主 Agent\n- [[ClaudeCode]] — 上游基础项目\n\n## Contradictions\n\n- 与[[github-hermes-ecosystem|GitHub Hermes 生态系统综述]]无直接矛盾，两者属于不同领域的 AI 编程工具（latte 专注于 CLI 编程助手，Hermes Agent 专注于自我进化 AI Agent）\n- 与现有 wiki 中关于 [[ClaudeCode]] 的描述无冲突，latte 本质是 Claud Code 的可选分支，拓展了其功能和可插拔性\n",
    "preview": "## Summary AGENTS.md 是 **latte** 项目的操作指引文件。latte 是 [[Anthropic]] [[Claude]] Code CLI（版本 2.1.90）的一个可构建分支（fork），由用户 wxj-1019 维护。核心差异包括：移除遥测、移除安全硬编码守卫、解锁 54 个实验性功能、内置中文界面与多模型支持（通过 [[OpenAI]] 兼容适配器接入 [[DeepSeek]]、Kimi、GLM、[[",

    "id": "sources/main-fund-selection-system-analysis",
    "label": "主力选股系统整体分析文档",
    "type": "source",
    "color": "#4CAF50",
    "path": "wiki/sources/main-fund-selection-system-analysis.md",
    "markdown": "---\ntitle: \"主力选股系统整体分析文档\"\ntype: source\ntags: [stock-selection, ai-analysis, quant-scoring, backtest, system-design]\ndate: 2026-05-06\nsource_file: raw/uploads/MAIN_FUND_SELECTION_ANALYSIS.md\n---\n\n## Summary\n\n本文档详细描述了一套[[AIAgent|AI驱动的]]旗舰智能选股系统\"主力选股\"的完整架构。该系统采用从数据获取到回测验证的六层流水线设计，集成了7种选股策略、量化预评分系统、5位[[AIAgent|AI分析师]]并行分析、资深研究员综合决策和自动回测验证机制，目标是从全市场主力资金流入股票中每日精选3-10只最优标的。\n\n## Key Claims\n\n- 系统采用\"数据获取 → 多层级筛选 → 量化预评分 → [[AIAgent|AI五维分析]] → 资深研究员综合 → 回测验证\"的六层架构，每一层都是Fail-Closed设计\n- 内置7种选股策略（主力吸筹、短期爆发、价值稳健、成长潜力、板块轮动、低风险收益、温和回调多头），各有独立的过滤条件、量化权重和适配标准\n- 量化预评分系统（[[QuantitativeAnalysis|Quant Scorer]]）从资金强度35分、量价配合30分、基本面20分、估值安全15分四个维度综合评分，并叠加策略专属公式Overlay\n- 5位[[AIAgent|AI分析师]]（资金流向、行业板块、财务基本面、技术形态、量化）通过asyncio.Semaphore并行执行，资深研究员汇总输出推荐\n- 推荐分层双轨制：\"优先推荐\"（strict）和\"谨慎参考\"（caution），后者包含4种具体场景\n- 回测引擎使用T+1开盘价、双边总成本0.23%的模型，支持1/3/5/10日持有期\n- 系统包含丰富的降级策略：AI不可用时按量化+风控规则降级，推荐数量不足时量化回填\n- 涉及重要数据源：[[WencaiAPI|问财API]]（pywencai）和[[Tushare|Tushare API]]\n\n## Key Quotes\n\n> \"主力选股是系统的旗舰智能选股功能，采用「数据获取 → 多层级筛选 → 量化预评分 → AI五维分析 → 资深研究员综合 → 回测验证」的六层架构\"\n\n> \"每一层都是Fail-Closed（失败时返回空而非放行），确保推荐质量\"\n\n## Connections\n\n- [[AIAgent]] — AI分析师体系和资深研究员是该系统的核心智能层\n- [[LargeLanguageModels]] — 5位AI分析师和资深研究员均基于LLM驱动\n- [[QuantitativeAnalysis]] — 量化预评分系统是AI分析前的关键过滤层\n- [[Backtesting]] — 自动回测验证系统形成闭环\n- [[RiskManagement]] — 多层防御式筛选和降级策略体现风控设计\n- [[DataPipeline]] — 数据获取层（[[WencaiAPI|问财API]]、[[Tushare|Tushare]]）构成基础\n- [[Tushare]] — 技术指标计算与备选数据源\n- [[WencaiAPI]] — 主要数据源\n- [[MainFundSelectionSystem|MainFundSelection]] — 主力选股系统的核心实体\n\n## Contradictions\n\n- 本文档与现有wiki内容无直接矛盾，但引入了新的中国A股金融领域知识（选股策略、量化评分、回测等），属于领域扩展而非冲突",
    "preview": "## Summary 本文档详细描述了一套[[AIAgent|AI驱动的]]旗舰智能选股系统\"主力选股\"的完整架构。该系统采用从数据获取到回测验证的六层流水线设计，集成了7种选股策略、量化预评分系统、5位[[AIAgent|AI分析师]]并行分析、资深研究员综合决策和自动回测验证机制，目标是从全市场主力资金流入股票中每日精选3-10只最优标的。 ## Key Claims",

    "path": "wiki/sources/things-we-learned-about-llms-in-2024.md",
    "markdown": "---\ntitle: \"Things we learned about LLMs in 2024\"\ntype: source\ntags: [llm, review, 2024, simon-willison]\ndate: 2024-12-31\nsource_file: raw-inbox/batches/batch-web-2026-05-06.md\n---\n\n## Summary\n\n[[SimonWillison]]'s comprehensive review of the LLM landscape in 2024, covering the breaking of the [[GPT4]] barrier, plummeting costs, multimodal capabilities, the rise of inference-scaling reasoning models ([[o1]], [[DeepSeekR1]]), and the growing gap between \"agents\" and practical utility. Also covers environmental impact, synthetic training data, and the challenge of making LLMs usable for non-experts.\n\n## Key Claims\n\n- The GPT-4 barrier was comprehensively broken in 2024 — 70+ models now outrank the original GPT-4 from March 2023, by 18 different organizations.\n- GPT-4-class models now run on consumer laptops (e.g., [[LLaMA|Llama 3.3 70B]], [[Qwen|Qwen2.5-Coder-32B]]), a remarkable efficiency gain.\n- LLM prices crashed dramatically: GPT-4o is 12x cheaper than GPT-4; Google Gemini 1.5 Flash 8B can process 68,000 images for $1.68.\n- Multimodal vision is now ubiquitous across vendors; audio and live video are emerging (ChatGPT Advanced Voice, Gemini live camera).\n- Prompt-driven app generation ([[Claude|Claude Artifacts]], GitHub Spark) has become a commodity feature.\n- Inference-scaling \"reasoning\" models ([[o1]], [[DeepSeekR1]], [[QwQ]]) represent a new scaling paradigm: more compute at inference time instead of training time.\n- [[DeepSeekV3]] (685B params) was trained for ~$5.6M — 11x less than [[LLaMA|Llama 3.1 405B]] — yet benchmarks near [[Claude|Claude 3.5 Sonnet]].\n- \"Agents\" still haven't really happened — gullibility remains a fundamental roadblock to autonomous action.\n- Synthetic training data is now a deliberate advantage, not a crutch, enabling structured learning and small-model distillation.\n- LLMs got even harder to use despite greater capability; they remain \"chainsaws disguised as kitchen knives\".\n\n## Key Quotes\n\n> \"The boring yet crucial secret behind good system prompts is test-driven development. You don't write down a system prompt and find ways to test it. You write down tests and find a system prompt that passes them.\" — [[AmandaAskell]]\n\n> \"Those US export regulations on GPUs to China seem to have inspired some *very* effective training optimizations!\" — on [[DeepSeekV3]]'s $5.6M training cost\n\n> \"Society needs concise ways to talk about modern A.I. — both the positives and the negatives. 'Ignore that email, it's spam,' and 'Ignore that article, it's slop,' are both useful lessons.\"\n\n## Connections\n\n- [[SimonWillison]] — author of the review, prolific LLM blogger/tool builder\n- [[GPT4]] — the benchmark that was comprehensively surpassed in 2024\n- [[o1]] — OpenAI's inference-scaling reasoning model (September 2024)\n- [[DeepSeekV3]] — cost-efficient 685B model trained for $5.6M\n- [[DeepSeekR1]] — DeepSeek's reasoning model that generated training data for V3\n- [[Claude]] — Anthropic's model family, Claude 3.5 Sonnet was Willison's favorite in 2024\n- [[Gemini]] — Google's multi-modal model with 2M token context\n- [[LLaMA]] — Meta's open-weight model family\n- [[Qwen]] — Alibaba's model family, including Qwen2.5-Coder and QwQ reasoning model\n- [[AIAgent]] — concept discussed critically; agents remain impractical due to gullibility\n- [[ChainOfThought]] — precursor technique to inference-scaling reasoning models\n- [[AmandaAskell]] — Anthropic researcher, emphasized test-driven development for prompts\n- [[MLX]] — Apple's ML library for Apple Silicon\n- [[NotebookLM]] — Google's audio summary tool with realistic podcast voices\n- [[SyntheticData]] — deliberate use of AI-generated training data\n- [[Slop]] — term for unwanted AI-generated content, coined in 2024\n- [[ModelCollapse]] — theory of degeneration from recursive training data (contrary evidence)\n- [[AppleIntelligence]] — Apple's LLM features, described as \"bad\"\n\n## Contradictions\n\n- Contradicts the [[ModelCollapse]] concern: synthetic data is being used deliberately and effectively, not causing model degeneration.\n- Nuances the wiki's current optimistic take on [[AIAgent]]: Willison argues agents haven't really happened yet due to gullibility, contrasting with the Hermes agent's self-improvement framing.\n- The environmental impact narrative is split: per-prompt costs dropped dramatically (good), but datacenter buildout is massive (bad).\"\n",

    "markdown": "---\ntitle: \"王信杰 — 后端开发工程师简历\"\ntype: source\ntags: [resume, backend, java, blockchain]\ndate: 2026-05-08\nsource_file: raw/3_后端开发工程师.md\n---\n\n## Summary\n\n王信杰的求职简历，浙江科技大学毕业生，曾在[[海康威视]]担任后端开发实习生。参与过[[能源大数据平台]]和[[慧公寓管理系统]]两个主要项目，具备Spring Boot微服务架构、Redis集群、区块链（[[HyperledgerFabric]]）和AI混合模型（[[DeepLearning|深度学习]]+[[GeneticAlgorithm|遗传算法]]）的实战经验。有论文被EI检索。竞赛方面获得过[[中国计算机设计大赛]]国家级三等奖和[[服务外包竞赛]]地区三等奖。\n\n## Key Claims\n\n- 能源大数据平台采用微服务架构+Redis集群，支持5000 QPS并发，响应时间<500ms，系统可用性达99.99%\n- 慧公寓管理系统引入[[HyperledgerFabric]]区块链+零知识证明（[[ZKP]]），数据泄露风险降低90%，跨部门协作效率提升50%\n- 慧公寓管理系统中使用[[DeepLearning|深度学习]]+[[GeneticAlgorithm|遗传算法]]混合模型动态分配宿舍，空置率从30%降至10%，人工干预减少45%\n- 技术栈核心为Java（Spring Boot, MyBatis-Plus, Spring Cloud Alibaba）、Redis、RocketMQ\n- 海康威视实习期间参与Python组件平台开发和Java敏捷项目，处理国际业务的消息服务和增值服务\n\n## Key Quotes\n\n> \"为解决数据安全问题，引入Hyperledger Fabric区块链，通过智能合约与零知识证明（ZKP）加密，降低数据泄露风险90%\"\n\n> \"为解决动态分配，设计深度学习+遗传算法混合模型，动态分析入住需求与优先级，空置率从30%降至10%\"\n\n## Connections\n\n- [[海康威视]] — 实习公司，全球领先的安防与物联网解决方案提供商\n- [[HyperledgerFabric]] — 区块链框架，用于慧公寓管理系统的数据安全\n- [[ZKP]] — 零知识证明，与区块链结合用于隐私保护\n- [[能源大数据平台]] — 项目，微服务+Redis集群实现高并发\n- [[慧公寓管理系统]] — 项目，区块链+AI混合模型实现智能分配\n- [[SpringBoot]] — 核心后端框架\n- [[Redis]] — 缓存与集群中间件\n- [[RocketMQ]] — 消息队列中间件\n- [[SpringCloudAlibaba|Spring Cloud Alibaba]] — 微服务治理框架\n- [[DeepLearning|深度学习]] — 用于动态需求分析的AI技术\n- [[GeneticAlgorithm|遗传算法]] — 与深度学习结合的优化算法\n- [[中国计算机设计大赛]] — 获奖竞赛\n- [[服务外包竞赛]] — 获奖竞赛\n\n## Contradictions\n\n- 简历中两次重复列出同一获奖经历（\"2022.8 获得中国计算机设计大赛国家级三等奖\"和\"2023.5 获得服务外包竞赛地区三等奖\"各出现两次），疑为排版重复而非不同的奖项\n- 简历中提及论文被EI检索但未提供论文标题或检索编号，无法验证claims准确性",

    "markdown": "---\ntitle: \"Foundation Models Overview\"\ntype: synthesis\ntags: [overview, llm, foundation-models]\nsources: [intro-to-llms, attention-is-all-you-need]\nlast_updated: 2024-03-25\n---\n\n# Foundation Models Overview\n\nFoundation models are large-scale AI models trained on broad data that can be adapted to a wide range of downstream tasks.\n\n## The Transformer Era\n\nThe modern foundation model era began with the [[Transformer]] architecture (2017), which introduced [[AttentionMechanism|self-attention]] as a replacement for recurrent layers. [[Google]] invented it; [[OpenAI]] scaled it.\n\n## Key Model Families\n\n| Model | Architecture | Organization | Notable Feature |\n|---|---|---|---|\n| [[GPT]] | Decoder-only | [[OpenAI]] | Autoregressive generation |\n| [[BERT]] | Encoder-only | [[Google]] | Bidirectional understanding |\n| [[T5]] | Encoder-decoder | [[Google]] | Text-to-text framework |\n| [[LLaMA]] | Decoder-only | Meta | Open weights |\n\n## Scaling Laws\n\nModel capability improves predictably with:\n- Compute (FLOPs)\n- Data (tokens)\n- Parameters (model size)\n\n## Connections\n- [[Transformer]] — universal architecture\n- [[AttentionMechanism]] — core mechanism\n- [[OpenAI]] — commercial leader\n- [[Google]] — research leader\n",

    "markdown": "---\ntitle: \"Context Pack: transformer architecture\"\ntype: synthesis\ntags: [context-pack, memory]\ndate: 2026-05-05\ngoal: \"transformer architecture\"\ntarget: \"wiki/concepts/Transformer.md\"\nbudget: 3000\n---\n\n# Context Pack: transformer architecture\n\n**Budget**: 3000 tokens | **Pages**: 1 | **Estimated**: 306 tokens\n\n## Pages\n\n### Transformer (target)\n*Path*: `wiki\\concepts\\Transformer.md`\n\n# Transformer\n\nThe **Transformer** is a deep learning architecture introduced in the paper \"[[attention-is-all-you-need]]\" by [[Vaswani]] et al. (2017) at [[Google]] Research. The author list includes Ashish Vaswani, Noam Shazeer, Niki Parmar, Jakob Uszkoreit, Llion Jones, Aidan N. Gomez, and Łukasz Kaiser.\n\n## Architecture\n\n### Encoder\n- Multi-head self-attention\n- Position-wise feed-forward networks\n- Layer normalization and residual connections\n\n### Decoder\n- Masked self-attention (autoregressive)\n- Cross-attention over encoder outputs\n- Position-wise feed-forward networks\n\n## Key Innovation\nThe Transformer replaces recurrence with [[AttentionMechanism]] (self-attention), allowing:\n- Parallel computation across sequence positions\n- Direct modeling of long-range dependencies\n- Better gradient flow during training\n\n## Variants\n- **Encoder-only**: [[BERT]], RoBERTa, DistilBERT\n- **Decoder-only**: [[GPT]] series, [[LLaMA]], Claude\n- **Encoder-decoder**: [[T5]], BART, UL2\n\n## Connections\n- [[AttentionMechanism]] — core operation\n- [[OpenAI]] — scaled decoder-only Transformers via [[GPT]]\n- [[Google]] — original inventors\n- [[StateSpaceModels]] — alternative architectures challenging the Transformer paradigm\n\n---\n",
