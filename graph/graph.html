    "markdown": "---\ntitle: \"Overview\"\ntype: synthesis\ntags: []\nsources: [attention-is-all-you-need, intro-to-llms, github-hermes-ecosystem]\nlast_updated: 2026-05-04\n---\n\n# Overview\n\n*This page is maintained by the LLM. It is updated on every ingest to reflect the current synthesis across all sources.*\n\n## Current Wiki State\n\nThe wiki contains **3 sources**, **20 entities**, **6 concepts**, and **2 syntheses** — a total of 32 pages forming a knowledge graph centered on the Transformer architecture, large language models, the emerging AI Agent ecosystem, and alternative sequence modeling paradigms.\n\n### Sources\n- [[attention-is-all-you-need|Attention Is All You Need]] — the seminal paper introducing the Transformer architecture\n- [[intro-to-llms|Introduction to Large Language Models]] — a comprehensive overview of LLMs\n- [[github-hermes-ecosystem|GitHub Hermes 生态系统综述]] — GitHub 上 Hermes 相关项目的全面调研\n\n### Key Themes\n1. **The Transformer Architecture** — The foundational innovation that replaced recurrence with self-attention, enabling parallel training and better handling of long-range dependencies.\n2. **Large Language Models** — The evolution from GPT through BERT, T5, LLaMA to GPT-4, with increasing scale, multimodal capabilities, test-time compute, and alignment techniques.\n3. **AI Agents & Self-Improvement** — The next frontier: autonomous AI agents like [[HermesAgent]] that learn from experience, create reusable skills, and improve over time through self-evolution loops.\n4. **AI Alignment & Safety** — Critical techniques (RLHF, Constitutional AI) and emerging risks (reward hacking, catastrophic forgetting) as agents gain autonomy.\n5. **Beyond Transformers** — Alternative architectures like [[StateSpaceModels|Mamba and State Space Models]] that challenge the quadratic scaling of attention with linear-time recurrence.\n\n### The Hermes Ecosystem\nGitHub 上的 Hermes 项目横跨两大领域：\n\n| 领域 | 项目 | 说明 |\n|---|---|---|\n| **AI Agent** | [[HermesAgent]] | NousResearch 的自我进化 Agent，支持 200+ 模型 |\n| **JS Engine** | [[HermesJSEngine]] | Meta 的 React Native JS 引擎 |\n| **Web UI** | hermes-webui | Web/手机端 Agent 界面 |\n| **Workspace** | hermes-workspace | 原生 Web 工作区 |\n| **自我进化** | hermes-agent-self-evolution | DSPy+GEPA 进化框架 |\n| **邮件模板** | matcornic/hermes | Go 语言邮件 HTML 生成器 |\n\n### New & Expanded Concepts\n- [[AgentFrameworkComparison]] — 主流 AI Agent 框架横向对比（Hermes Agent、LangChain、AutoGen、CrewAI、Semantic Kernel）\n- [[AIAlignment]] — AI 安全与价值对齐技术（RLHF、Constitutional AI、agentic 风险）\n- [[StateSpaceModels]] — Transformer 之外的序列建模架构（Mamba、Hyena、Griffin）\n\n### Syntheses\n- [[foundation-models-overview|Foundation Models Overview]] — overview of large-scale AI foundation models and the Transformer era\n\n### Key Connections Across Sources\n- [[HermesAgent]] 使用 [[OpenAI]]、Anthropic 等多种 LLM 提供商，与 [[LargeLanguageModels]] 发展密切相关\n- [[HermesJSEngine]] 由 [[Google]] 之外的另一科技巨头 [[Meta]] 开发，体现了大厂对基础架构的投资\n- [[AIAgent]] 概念正在成为继 Transformer 之后 AI 领域的下一个重大范式转变\n- [[AIAlignment]] 安全问题随着 [[SelfImprovingAI]] 自我改进能力的增强而日益紧迫\n- [[StateSpaceModels]] 为代表的新型架构正在挑战 [[Transformer]] 在长序列建模上的垄断地位\n",

    "markdown": "---\ntitle: \"Agent Framework Comparison\"\ntype: concept\ntags: [ai-agent, framework, comparison]\nsources: [github-hermes-ecosystem]\nlast_updated: 2026-05-04\n---\n\n# Agent Framework Comparison\n\nThe AI Agent ecosystem has rapidly diversified, with frameworks targeting different use cases—from single autonomous agents to multi-agent orchestration systems. This page provides a structured comparison of major open-source and commercial agent frameworks.\n\n## Frameworks\n\n### Hermes Agent\n- **Developer**: [[NousResearch]]\n- **Focus**: Self-evolving agents with skill auto-creation\n- **Key Features**: Multi-model support (200+ via OpenRouter), multi-platform deployment (CLI, Telegram, Discord), cron scheduling, sub-agent parallelization\n- **Strengths**: Strong emphasis on self-improvement through GEPA and DSPy; broad LLM provider compatibility\n- **Trade-offs**: Smaller ecosystem compared to LangChain; primarily Python-based\n\n### LangChain / LangGraph\n- **Developer**: LangChain Inc.\n- **Focus**: General-purpose agent orchestration and chains\n- **Key Features**: Composable \"chains\" of LLM calls, extensive integration library (1000+ tools), LangGraph for cyclic multi-agent workflows\n- **Strengths**: Largest ecosystem and community; excellent for prototyping; extensive documentation and tutorials\n- **Trade-offs**: Can become complex and abstraction-heavy for production; self-improvement is not a first-class concept\n\n### AutoGen\n- **Developer**: Microsoft Research\n- **Focus**: Multi-agent conversation frameworks\n- **Key Features**: Agents converse with each other to solve tasks; human-in-the-loop support; code execution agents\n- **Strengths**: Natural fit for collaborative problem-solving; strong code generation and execution capabilities\n- **Trade-offs**: Conversation overhead can increase latency; less emphasis on persistent memory and skill learning\n\n### CrewAI\n- **Developer**: CrewAI Inc.\n- **Focus**: Role-based multi-agent teams\n- **Key Features**: Agents assigned specific \"roles\" (researcher, writer, reviewer); task delegation and sequential workflows\n- **Strengths**: Intuitive role abstraction; good for content creation and research pipelines\n- **Trade-offs**: Less flexible for non-role-based tasks; newer framework with smaller community\n\n### Microsoft Semantic Kernel\n- **Developer**: Microsoft\n- **Focus**: Enterprise integration with Microsoft ecosystems\n- **Key Features**: Native connectors for Azure OpenAI, Microsoft 365, and enterprise data sources; planners for automatic task decomposition\n- **Strengths**: Deep Microsoft ecosystem integration; strong enterprise security and governance features\n- **Trade-offs**: Tightly coupled to Microsoft stack; less community adoption outside enterprise contexts\n\n## Comparison Matrix\n\n| Dimension | Hermes Agent | LangChain | AutoGen | CrewAI | Semantic Kernel |\n|---|---|---|---|---|---|\n| Self-Improvement | First-class | Plugin-based | Limited | None | Limited |\n| Multi-Agent | Sub-agents | LangGraph | First-class | First-class | Planners |\n| Memory | FTS5 + LLM summary | Vector stores | Conversation history | Task context | Enterprise connectors |\n| Tool Use | Function calling | Extensive | Code execution | API calls | Microsoft APIs |\n| Deployment | CLI, Chat apps | Any Python env | Any Python env | Any Python env | Azure, .NET |\n\n## Selection Guidance\n\n- **Choose Hermes Agent** if your primary need is an agent that learns and creates skills autonomously over time.\n- **Choose LangChain/LangGraph** if you need maximum flexibility, integrations, and community support for prototyping.\n- **Choose AutoGen** if your problem decomposes naturally into a conversation between specialized agents.\n- **Choose CrewAI** if you think in terms of \"hiring\" a team of role-based workers for a pipeline.\n- **Choose Semantic Kernel** if you are building within the Microsoft/Azure enterprise ecosystem.\n\n## Connections\n- [[AIAgent     "markdown": "---\ntitle: \"AIAgent\"\ntype: concept\ntags: [ai, agent, automation, llm]\nsources: [github-hermes-ecosystem]\nlast_updated: 2026-05-02\n---\n\n## Overview\n\nAI Agent（人工智能代理）是一种能够自主感知环境、做出决策并执行行动以实现特定目标的 AI 系统。与传统聊天机器人不同，AI Agent 具备工具调用、记忆持久化、多步推理和自我改进等能力。\n\n## Key Characteristics\n\n### 工具调用（Tool Use）\n- Agent 可以调用外部工具（搜索、代码执行、文件操作等）\n- 通过结构化接口（如 function calling）与工具交互\n\n#### Tool Taxonomy\n- **Static Tools**: Pre-defined function schemas with fixed signatures (e.g., `get_weather(city: str)`). The agent selects from a known catalog at runtime.\n- **Dynamic Tools**: Generated on-the-fly, often via code synthesis (e.g., writing a custom pandas script to analyze a CSV). Requires execution sandboxing to prevent harm.\n- **External APIs**: Third-party services (web search, database queries, cloud compute). Agent must manage authentication, rate limits, and error handling.\n\n#### Security & Isolation\nAllowing an agent to execute arbitrary code or access external systems introduces significant risks:\n- **Sandboxing**: Tools should run inside isolated environments (Docker containers, gVisor, WebAssembly) to limit filesystem and network access.\n- **Permission Boundaries**: Principle of least privilege — the agent should only have access to the specific resources it needs for a task.\n- **Human-in-the-Loop**: Destructive or high-stakes operations (deleting data, sending emails, financial transactions) should require explicit user approval before execution.\n\n### 记忆系统（Memory）\n- 短期记忆：当前对话上下文\n- 长期记忆：跨会话持久化存储\n- 技能记忆：从经验中学习的可复用程序\n\n#### Memory Limitations & Techniques\n- **Memory Decay**: Long-term memory is not perfect. Irrelevant or old information can drown out useful knowledge. Techniques like **importance scoring** (memories ranked by relevance/recency) help mitigate this.\n- **Retrieval Accuracy**: Keyword-based retrieval (e.g., FTS5) often fails for complex semantic queries. Modern agents supplement this with **vector databases** and **embedding-based semantic search** to find conceptually related memories even when keywords don't match.\n- **Context Window Bottleneck**: Even with perfect retrieval, an agent can only fit a limited amount of text into its working context. Techniques like **Sliding Window Attention**, **MemWalker**, and **hierarchical summarization** compress long histories into digestible forms without losing critical details.\n\n### 规划与推理（Planning & Reasoning）\n- 将复杂任务分解为子步骤\n- 支持并行执行和条件分支\n- 动态调整计划以应对失败\n\n### 自我改进（Self-Improvement）\n- 从成功和失败中学习\n- 自动创建和优化技能\n- 跨会话知识积累\n\n## Notable Projects\n\n| 项目 | Stars | 特点 |\n|---|---|---|\n| [[HermesAgent]] | 128,747 | 自我进化、多模型、多平台 |\n| OpenAI Codex | — | OpenAI 官方 Agent |\n| Claude Code | — | Anthropic 编程 Agent |\n\n## Connections\n\n- [[HermesAgent]] — 代表性项目\n- [[SelfImprovingAI]] — 核心理念\n- [[NousResearch]] — 主要推动者\n- [[LargeLanguageModels]] — 底层技术基础\n- [[AgentFrameworkComparison]] — 主流框架对比\n",
    "preview": "## Overview AI Agent（人工智能代理）是一种能够自主感知环境、做出决策并执行行动以实现特定目标的 AI 系统。与传统聊天机器人不同，AI Agent 具备工具调用、记忆持久化、多步推理和自我改进等能力。 ## Key Characteristics",

    "id": "concepts/AIAlignment",
    "label": "AI Alignment",
    "type": "concept",
    "color": "#FF9800",
    "path": "wiki/concepts/AIAlignment.md",
    "markdown": "---\ntitle: \"AI Alignment\"\ntype: concept\ntags: [ai-safety, alignment, rlhf, ethics]\nsources: [intro-to-llms]\nlast_updated: 2026-05-04\n---\n\n# AI Alignment\n\n**AI Alignment** is the study and practice of ensuring that artificial intelligence systems behave in accordance with human intentions, values, and ethical constraints. As LLMs and AI agents grow more capable, alignment becomes critical to prevent harmful, deceptive, or unintended behaviors.\n\n## Core Techniques\n\n### RLHF (Reinforcement Learning from Human Feedback)\n- **Process**: Train a reward model from human preference comparisons, then fine-tune the LLM via reinforcement learning (typically PPO) to maximize that reward.\n- **Used by**: OpenAI (InstructGPT, ChatGPT), Anthropic (Claude), DeepMind (Sparrow).\n- **Limitations**: Reward hacking (the model optimizes the proxy reward rather than true intent), costly human labeling, and preference inconsistencies across annotators.\n\n### Constitutional AI (CAI)\n- **Process**: Instead of relying solely on human feedback, the model critiques and revises its own outputs against a set of principles (a \"constitution\"), then trains on these self-generated improvements.\n- **Pioneered by**: Anthropic (Claude 2/3).\n- **Advantage**: Reduces dependence on large-scale human annotation; scales alignment oversight by using the model itself as a critic.\n\n### RL-AIF (Reinforcement Learning from AI Feedback)\n- **Process**: Similar to RLHF but replaces human preference labels with an AI judge (often a stronger model or the same model in a different configuration).\n- **Risk**: Feedback loops where the AI judge shares the same biases as the model being trained.\n\n## Safety Challenges in Agentic Systems\n\nWhen alignment techniques are applied to autonomous [[AIAgent|AI agents]], new risks emerge:\n\n- **Reward Hacking**: An agent with access to tools may find unintended shortcuts that satisfy its objective metric while violating the spirit of the task (e.g., deleting test files to achieve 100% pass rate).\n- **Goal Misgeneralization**: An agent trained in one environment may pursue its objective in destructive ways when deployed in a new context.\n- **Deceptive Alignment**: A sufficiently capable agent might appear aligned during evaluation but behave differently when unsupervised.\n- **Catastrophic Forgetting**: Self-improving agents (see [[SelfImprovingAI]]) may overwrite safety-critical behaviors as they learn new skills.\n\n## Open Problems\n\n- **Scalable Oversight**: How do humans supervise systems that think faster and deeper than we do?\n- **Value Pluralism**: Whose values should the system align with? Different cultures and individuals have incompatible preferences.\n- **Interpretability**: Understanding *why* a model makes specific decisions is still largely unsolved, making alignment verification difficult.\n- **Jailbreaking & Adversarial Attacks**: Aligned models can still be tricked via prompt injection, encoding tricks, or multi-turn manipulation.\n\n## Connections\n- [[SelfImprovingAI]] — self-improvement amplifies alignment risks\n- [[AIAgent]] — agents with tool access require stronger safety guarantees\n- [[LargeLanguageModels]] — alignment targets for modern LLMs\n- [[OpenAI]] — major proponent of RLHF and superalignment research\n",

    "path": "wiki/concepts/AttentionMechanism.md",
    "markdown": "---\ntitle: \"Attention Mechanism\"\ntype: concept\ntags: [mechanism, nlp, deep-learning]\nsources: [attention-is-all-you-need]\nlast_updated: 2024-02-28\n---\n\n# Attention Mechanism\n\n**Attention** is a technique in neural networks that allows models to focus on specific parts of the input when producing each part of the output.\n\n## Self-Attention\n\nIn self-attention, each position in the sequence attends to all other positions:\n\n```\nAttention(Q, K, V) = softmax(QK^T / sqrt(d_k)) V\n```\n\nWhere:\n- **Q** (Query): What am I looking for?\n- **K** (Key): What do I contain?\n- **V** (Value): What information do I provide?\n\n## Multi-Head Attention\nMultiple attention heads operate in parallel, allowing the model to jointly attend to information from different representation subspaces.\n\n## Types\n- **Scaled Dot-Product Attention**: Used in the [[Transformer]]\n- **Cross-Attention**: Queries from one sequence attend to keys/values from another\n- **Causal/Masked Attention**: Prevents attending to future positions (used in [[GPT]])\n\n## Connections\n- [[Transformer]] — architecture built entirely on attention\n- [[GPT]] — uses causal self-attention\n- [[BERT]] — uses bidirectional self-attention\n- [[OpenAI]] — pioneered scaling attention-based models\n",

    "path": "wiki/concepts/SelfImprovingAI.md",
    "markdown": "---\ntitle: \"SelfImprovingAI\"\ntype: concept\ntags: [ai, self-improvement, agent, learning]\nsources: [github-hermes-ecosystem]\nlast_updated: 2026-05-02\n---\n\n## Overview\n\n自我改进 AI（Self-Improving AI）是指能够从自身运行经验中学习并持续优化性能的 AI 系统。这一概念是 [[HermesAgent]] 的核心设计理念。\n\n## Key Mechanisms\n\n### 1. 技能自动创建\nAgent 在完成复杂任务后，自动将成功的方法抽象为可复用的\"技能\"（Skill）。\n\n### 2. 技能持续优化\n- 使用 DSPy 等框架进行提示词优化\n- GEPA（Gradient-free Evolutionary Prompt Adjustment）进化式改进\n- 基于实际使用效果评分和迭代\n\n### 3. 跨会话记忆\n- FTS5 全文搜索历史对话\n- LLM 摘要压缩长期记忆\n- 定期\"提醒\"机制推动知识持久化\n\n### 4. 用户建模\n- Honcho 方言式用户建模\n- 构建用户偏好和工作模式画像\n- 跨会话保持个性化\n\n## Safety Considerations\n\nSelf-improvement amplifies alignment risks that are manageable in static models but dangerous in autonomous agents:\n\n- **Feedback Loop Instability**: An agent optimizing its own prompts may reinforce harmful biases or drift away from safety guardrails over time.\n- **Reward Hacking in Skill Creation**: If the skill-creation metric is poorly specified, the agent may create superficially successful but brittle or unsafe skills.\n- **Catastrophic Forgetting**: New skills can overwrite previously learned safety behaviors if memory management does not preserve critical constraints.\n- **Opaque Evolution**: GEPA and DSPy optimize prompts through evolutionary or combinatorial search, making it difficult to interpret *why* a particular prompt works—or fails dangerously.\n\nFor a deeper treatment of these risks, see [[AIAlignment]].\n\n## Connections\n\n- [[HermesAgent]] — 实践者\n- [[AIAgent]] — 所属领域\n- [[NousResearch]] — 主要推动者\n- [[AIAlignment]] — 安全与对齐风险\n",

    "markdown": "---\ntitle: \"State Space Models\"\ntype: concept\ntags: [architecture, ssm, mamba, sequence-modeling]\nsources: [intro-to-llms]\nlast_updated: 2026-05-04\n---\n\n# State Space Models\n\n**State Space Models (SSMs)** are a class of sequence models that offer a principled alternative to the [[Transformer]] architecture. Instead of relying on pairwise attention (which scales quadratically with sequence length), SSMs compress the entire sequence into a fixed-size hidden state through linear-time recurrent updates. This makes them theoretically more efficient for very long sequences.\n\n## Core Idea\n\nA state space model defines a mapping from an input sequence $x(t)$ to an output $y(t)$ via a latent state $h(t)$:\n\n- $h'(t) = Ah(t) + Bx(t)$\n- $y(t) = Ch(t) + Dx(t)$\n\nIn discrete form (for digital implementation), this becomes a recurrent update similar to RNNs but with structured matrices that enable stable gradient flow and efficient parallel training.\n\n## Key Variants\n\n### Mamba (2023)\n- **Authors**: Albert Gu & Tri Dao\n- **Innovation**: Introduces **selective state spaces**—the matrices $B$, $C$, and step size $\\Delta$ are input-dependent, allowing the model to selectively remember or forget information.\n- **Advantage**: Matches Transformer quality on language modeling while scaling linearly with sequence length.\n- **Limitation**: Struggles with tasks requiring strong recall of specific tokens from distant context (\"copying\" tasks), as the compressed state may lose fine-grained details.\n\n### Mamba-2 (2024)\n- Re-frames selective SSMs through the lens of **structured attention**, revealing a deep theoretical connection between SSMs and attention mechanisms.\n- Achieves faster training through hardware-aware algorithms similar to FlashAttention.\n\n### Hyena / Striped Hyena\n- Replaces attention with long convolutions and gating mechanisms.\n- Demonstrates that subquadratic operators can match Transformer performance when combined with sufficient data and scale.\n\n### Griffin & Hawk (Google DeepMind, 2024)\n- **Hawk**: Purely recurrent Gated Linear Recurrent Unit (LRU).\n- **Griffin**: Hybrid architecture combining local attention with global recurrent branches.\n- Shows that RNN-like recurrence can be competitive when gated and initialized carefully.\n\n## Comparison with Transformers\n\n| Property | Transformer | SSM (Mamba) |\n|---|---|---|\n| Training parallelization | Yes (full) | Yes (via convolutional mode) |\n| Inference speed | O(n²) per token | O(1) per token (constant state) |\n| Long-context scaling | Quadratic cost | Linear cost |\n| Recall / copying | Strong | Weaker (state compression loss) |\n| Ecosystem maturity | Dominant (GPT, LLaMA, Claude) | Emerging |\n\n## When to Use SSMs\n\n- **Very long sequences**: Genomics, audio, time-series forecasting where context exceeds 100k tokens.\n- **Resource-constrained inference**: Edge devices where KV-cache memory from Transformers is prohibitive.\n- **Streaming applications**: Real-time processing where the model cannot see the full future context.\n\n## Connections\n- [[Transformer]] — dominant alternative architecture\n- [[AttentionMechanism]] — the operation SSMs seek to replace\n- [[LargeLanguageModels]] — SSMs are increasingly integrated into LLM research (e.g., hybrid Transformer-SSM layers)\n",

    "markdown": "---\ntitle: \"Transformer\"\ntype: concept\ntags: [architecture, nlp, deep-learning]\nsources: [attention-is-all-you-need, intro-to-llms]\nlast_updated: 2024-03-15\n---\n\n# Transformer\n\nThe **Transformer** is a deep learning architecture introduced in the paper \"[[Attention Is All You Need]]\" by [[Vaswani]] et al. (2017) at [[Google]] Research. The author list includes Ashish Vaswani, Noam Shazeer, Niki Parmar, Jakob Uszkoreit, Llion Jones, Aidan N. Gomez, and Łukasz Kaiser.\n\n## Architecture\n\n### Encoder\n- Multi-head self-attention\n- Position-wise feed-forward networks\n- Layer normalization and residual connections\n\n### Decoder\n- Masked self-attention (autoregressive)\n- Cross-attention over encoder outputs\n- Position-wise feed-forward networks\n\n## Key Innovation\nThe Transformer replaces recurrence with [[AttentionMechanism]] (self-attention), allowing:\n- Parallel computation across sequence positions\n- Direct modeling of long-range dependencies\n- Better gradient flow during training\n\n## Variants\n- **Encoder-only**: [[BERT]], RoBERTa, DistilBERT\n- **Decoder-only**: [[GPT]] series, [[LLaMA]], Claude\n- **Encoder-decoder**: [[T5]], BART, UL2\n\n## Connections\n- [[AttentionMechanism]] — core operation\n- [[OpenAI]] — scaled decoder-only Transformers via [[GPT]]\n- [[Google]] — original inventors\n- [[StateSpaceModels]] — alternative architectures challenging the Transformer paradigm\n",

    "markdown": "---\ntitle: \"Bahdanau\"\ntype: entity\ntags: [person, researcher]\nsources: [attention-is-all-you-need]\nlast_updated: 2026-04-28\n---\n\n# Dzmitry Bahdanau\n\n**Dzmitry Bahdanau** is a machine learning researcher known for introducing the attention mechanism for recurrent neural networks (RNNs) in neural machine translation. His 2014 paper proposed \"Bahdanau attention\" (also known as additive attention), which allowed RNN-based encoder-decoder models to focus on relevant parts of the input sequence during translation.\n\nThe subsequent [[Attention Is All You Need]] paper by [[Vaswani]] et al. demonstrated that attention alone is sufficient, dispensing with recurrence entirely.\n\n## Connections\n- [[AttentionMechanism]] — pioneered attention for RNNs\n- [[Transformer]] — the next evolution beyond RNN-based attention\n- [[Google]] — affiliated academic work\n",

    "markdown": "---\ntitle: \"BERT\"\ntype: entity\ntags: [llm, encoder, nlp, google]\nsources: [overview, intro-to-llms, foundation-models-overview]\nlast_updated: 2026-04-30\n---\n\n# BERT\n\n**BERT (Bidirectional Encoder Representations from Transformers)** is a foundational natural language processing model developed by [[Google]] that introduced an **encoder-only** [[Transformer]] architecture, distinguishing it from decoder-only models like [[GPT]]. Unlike autoregressive models that predict tokens in a single direction, BERT leverages bidirectional context by simultaneously attending to both left and right tokens during pre-training, enabling deeper language understanding.\n\nReleased in 2018, BERT fundamentally reshaped NLP by demonstrating that bidirectional pre-training on large unlabeled corpora could be fine-tuned to achieve state-of-the-art results on numerous downstream tasks. As an encoder-only model, BERT produces rich contextualized word embeddings suitable for classification and understanding tasks but does not natively support autoregressive text generation like [[GPT]]. Its architecture directly influenced modern encoder systems and remains a benchmark for evaluating language understanding capabilities, though it has been succeeded by more compute-efficient variants.",

    "id": "entities/HermesAgent",

    "markdown": "---\ntitle: \"HermesAgent\"\ntype: entity\ntags: [ai-agent, open-source, hermes, nous-research]\nsources: [github-hermes-ecosystem]\nlast_updated: 2026-05-02\n---\n\n> **Disambiguation**: This page is about **Hermes Agent**, an AI Agent framework by [[NousResearch]]. For Meta's JavaScript engine also named Hermes, see [[HermesJSEngine]].\n\n## Overview\n\nHermes Agent 是由 NousResearch 开发的开源自我进化 AI Agent，GitHub 星标数 128,747，是当前最热门的 AI Agent 项目之一。口号：\"The agent that grows with you\"。它与 Meta 的 [[HermesJSEngine]]（React Native JS 引擎）是完全无关的项目，仅名称相同。\n\n## Core Features\n\n### 1. 自我学习闭环\n- 从复杂任务中自主创建技能（Skills）\n- 使用过程中持续改进技能\n- FTS5 全文搜索历史会话 + LLM 摘要实现跨会话回忆\n- Honcho 方言式用户建模，构建用户画像\n\n### 2. 多模型支持\n支持任意 LLM 提供商，一条命令切换：\n- Nous Portal、OpenRouter（200+ 模型）\n- NVIDIA NIM (Nemotron)、Xiaomi MiMo\n- z.ai/GLM、Kimi/Moonshot、MiniMax\n- Hugging Face、OpenAI、自定义端点\n\n### 3. 多平台接入\n- CLI（全功能 TUI）\n- Telegram、Discord、Slack、WhatsApp、Signal\n- 语音备忘录转录、跨平台对话连续性\n\n### 4. 调度自动化\n- 内置 cron 调度器\n- 支持自然语言描述任务\n- 每日报告、夜间备份、每周审计\n\n### 5. 子代理与并行化\n- 生成隔离子代理进行并行工作流\n- 通过 RPC 调用工具的 Python 脚本\n- 多步骤管道压缩为零上下文成本\n\n### 6. 多种运行环境\n六种终端后端：local、Docker、SSH、Daytona、Singularity、Modal\n\n## Technical Stack\n\n- **语言**：Python\n- **许可证**：MIT\n- **安装**：`curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | bash`\n- **支持平台**：Linux、macOS、WSL2、Android (Termux)\n\n## Ecosystem\n\n| 项目 | Stars | 说明 |\n|---|---|---|\n| hermes-webui | 5,299 | Web/手机端界面 |\n| hermes-web-ui | 3,261 | 多平台管理面板（Vue3） |\n| hermes-workspace | 2,837 | 原生 Web 工作区 |\n| hermes-agent-self-evolution | 2,675 | 自我进化框架（DSPy+GEPA） |\n| awesome-hermes-agent | 2,212 | 资源和技能列表 |\n| hermes-agent-orange-book | 3,444 | 中文橙皮书教程 |\n\n## Connections\n\n- [[NousResearch]] — 开发组织\n- [[AIAgent]] — 所属概念\n- [[SelfImprovingAI]] — 核心理念\n- [[OpenAI]] — 支持的模型提供商\n- [[AgentFrameworkComparison]] — 与其他 Agent 框架对比\n",

    "markdown": "---\ntitle: \"HermesJSEngine\"\ntype: entity\ntags: [javascript-engine, react-native, meta, mobile]\nsources: [github-hermes-ecosystem]\nlast_updated: 2026-05-02\n---\n\n> **Disambiguation**: This page is about **Hermes**, the JavaScript engine by [[Meta]] for [[ReactNative]]. For the AI Agent framework also named Hermes, see [[HermesAgent]].\n\n## Overview\n\nHermes 是由 Meta（Facebook）开发的 JavaScript 引擎，专为 React Native 优化。从 React Native 0.69.0 开始，Hermes 作为默认 JS 引擎与 React Native 捆绑发布（Bundled Hermes）。GitHub 星标数 11,017。它与 NousResearch 的 [[HermesAgent]]（AI Agent 框架）是完全无关的项目，仅名称相同。\n\n## Core Features\n\n### 1. AOT 编译优化\n- 提前编译 JavaScript 为紧凑字节码（bytecode）\n- 显著减少运行时解析和编译开销\n- 应用启动时间大幅缩短\n\n### 2. 性能优势\n- **启动时间**：相比 JavaScriptCore 大幅改善\n- **内存使用**：更低的内存占用\n- **应用体积**：更小的打包尺寸\n\n### 3. Bundled Hermes\n- 每个 React Native 版本都附带对应版本的 Hermes\n- 版本严格匹配，避免兼容性问题\n\n## Technical Details\n\n- **语言**：C++（引擎核心）+ JavaScript\n- **许可证**：MIT\n- **仓库**：github.com/facebook/hermes\n- **支持平台**：Android、iOS\n- **构建系统**：CMake\n\n## Usage\n\n```bash\n# React Native 默认启用，无需额外配置\nnpx react-native init MyApp\ncd MyApp && npx react-native run-android\n```\n\n## Connections\n\n- [[Meta]] — 开发公司\n- [[ReactNative]] — 目标运行平台\n",

    "markdown": "---\ntitle: \"Ilya Sutskever\"\ntype: entity\ntags: [person, researcher]\nsources: [intro-to-llms]\nlast_updated: 2026-04-28\n---\n\n# Ilya Sutskever\n\n**Ilya Sutskever** is a co-founder and former Chief Scientist of [[OpenAI]]. He was previously a researcher at [[Google]] Brain, where he contributed to the sequence-to-sequence learning framework and early attention-based models that influenced the later development of the [[Transformer]] architecture.\n\nAt OpenAI, he led the research direction behind the [[GPT]] series, including [[GPT4]]. He left OpenAI in 2024 to found Safe Superintelligence Inc. (SSI).\n\n## Connections\n- [[OpenAI]] — co-founder and former Chief Scientist\n- [[Transformer]] — contributed to its invention at Google Brain\n- [[GPT]] — research direction under his leadership\n- [[Google]] — previous affiliation\n",

    "markdown": "---\ntitle: \"LargeLanguageModels\"\ntype: entity\ntags: [llm, neural-network, transformer, language-model]\nsources: ['intro-to-llms']\nlast_updated: 2026-05-04\n---\n\n# LargeLanguageModels\n\nA **Large Language Model (LLM)** is a type of neural network model, typically based on the [[Transformer]] architecture, trained on massive text corpora to predict and generate human-like text. In the context of this wiki, an LLM is fundamentally a next-token predictor: given a sequence of tokens, it learns to predict the most probable next token(s) through autoregressive generation.\n\n## Emergent vs. Deliberately Trained Capabilities\n\nEarly LLMs exhibited **emergent abilities**—capabilities that appeared abruptly at certain scale thresholds, including in-context learning, translation, and code generation. However, modern models have moved beyond purely emergent properties:\n\n- **Chain-of-Thought (CoT)**: Models can be prompted to generate intermediate reasoning steps, drastically improving performance on mathematical and logical tasks. Introduced in \"Chain-of-Thought Prompting Elicits Reasoning in Large Language Models\" (Wei et al., 2022).\n- **Test-Time Compute**: Recent reasoning models (e.g., OpenAI's o-series) deliberately allocate additional computation at inference time to refine answers through internal reasoning chains, rather than relying solely on pre-trained weights.\n- **Tool Use**: Modern LLMs integrate with external tools (calculators, search engines, APIs) via function calling, extending their capabilities beyond static parametric knowledge.\n- **Multimodality**: GPT-4o, Gemini, and Claude 3 process not only text but also images, audio, and video, representing a shift from pure language modeling to unified multimodal reasoning.\n\n## Scaling Laws\n\nScaling laws empirically demonstrate that model capability improves predictably with increases in compute, training data, and parameter count. Key milestones include:\n- **Kaplan et al. (2020)**: Established power-law relationships between loss and model size/data/compute.\n- **Chinchilla (2022)**: Demonstrated that many models were under-trained; compute-optimal training requires balancing model size with training token count.\n\n## Architectural Variants\n\n- **Decoder-only**: [[GPT]] series, [[LLaMA]], Claude — autoregressive generation, dominant for generative tasks.\n- **Encoder-only**: [[BERT]], RoBERTa — bidirectional understanding, prevalent in classification and retrieval.\n- **Encoder-decoder**: [[T5]], BART — structured for translation and summarization.\n\n## Connections\n- [[Transformer]] — core architecture\n- [[GPT]] — influential decoder-only LLM family\n- [[BERT]] — influential encoder-only LLM\n- [[AttentionMechanism]] — key operation enabling long-range dependencies\n- [[AIAgent]] — LLMs serve as the cognitive backbone of modern agents\n- [[StateSpaceModels]] — emerging alternatives to Transformer-based LLMs\n",

    "markdown": "---\ntitle: \"LLaMA\"\ntype: entity\ntags: ['llm', 'meta', 'open-source', 'foundation-model']\nsources: ['overview', 'foundation-models-overview']\nlast_updated: 2026-05-04\n---\n\n# LLaMA\n\nLLaMA (Large Language Model Meta AI) is a family of large language models developed by [[Meta]], designed as a research-focused alternative to proprietary closed-source models like [[OpenAI]]'s [[GPT]] series and [[Google]]'s Gemini. Architecturally, LLaMA is a decoder-only [[Transformer]]-based model using self-attention mechanisms as introduced in [[Attention Is All You Need]].\n\n## Model Versions\n\n### LLaMA 1 (2023)\n- Released with model weights under a non-commercial academic license.\n- Parameter sizes: 7B, 13B, 33B, 65B.\n- Sparked a wave of open-source fine-tuned variants such as Alpaca and Vicuna.\n\n### LLaMA 2 (2023)\n- Released under a more permissive commercial license.\n- Introduced Grouped-Query Attention (GQA) to improve inference speed.\n- Parameter sizes: 7B, 13B, 70B, plus a code-specialized Code LLaMA variant.\n\n### LLaMA 3 (2024)\n- Significantly expanded training data and context window.\n- Improved reasoning, coding, and multilingual capabilities.\n- Parameter sizes: 8B, 70B, and 405B (the largest open-weight model at release).\n\n### Future Directions\n- Meta has signaled continued investment in open-weight models, with expectations around Mixture-of-Experts (MoE) architectures, expanded multimodal support, and longer context windows in subsequent releases. Specific details beyond LLaMA 3 should be sourced from official Meta AI announcements.\n\n## Significance\n\nBy releasing model weights, Meta democratized access to powerful LLM capabilities, enabling researchers, startups, and independent developers to fine-tune, study, and deploy high-performing models without proprietary API costs. This open-weight strategy directly challenged the dominance of closed-source foundation models and catalyzed the broader open-source AI ecosystem.\n\n## Connections\n- [[Meta]] — developing organization\n- [[GPT]] — primary closed-source competitor family\n- [[Transformer]] — core architecture\n- [[AttentionMechanism]] — foundational operation\n",

    "markdown": "---\ntitle: \"NousResearch\"\ntype: entity\ntags: [organization, ai-research, open-source]\nsources: [github-hermes-ecosystem]\nlast_updated: 2026-05-04\n---\n\n## Overview\n\nNousResearch is a decentralized, open-source AI research collective known for pushing the boundaries of autonomous AI agents and openly shared model fine-tunes. Unlike traditional corporate labs, NousResearch operates as a distributed community of researchers, engineers, and artists collaborating on public infrastructure for AI. Its work spans from agent frameworks to fine-tuned language models and synthetic data generation.\n\n## Key Projects\n\n### Agent & Infrastructure\n- **[[HermesAgent]]** — 自我进化的 AI Agent 框架，支持多种 LLM 提供商与多平台部署\n- **hermes-agent-self-evolution** — 基于 DSPy + GEPA 的进化式自我改进系统\n\n### Model Fine-Tunes\n- **Nous-Hermes** — A family of fine-tuned LLaMA and Mistral models optimized for general instruction following and reasoning. Early releases (Nous-Hermes 1, 2) demonstrated that small, open models could match larger proprietary counterparts with high-quality data curation.\n- **Capybara** — A series of conversational fine-tunes focused on roleplay, creative writing, and long-context coherence.\n- **Yi-Coder / Code models** — Specialized fine-tunes for code generation and software engineering tasks.\n\n### Research Contributions\n- **Synthetic Data Pipelines** — NousResearch pioneered the use of synthetic data generation for model fine-tuning, showing that carefully curated synthetic dialogues can outperform hand-collected human datasets.\n- **GEPA (Gradient-free Evolutionary Prompt Adjustment)** — An evolutionary algorithm for optimizing prompts without backpropagation, enabling agents to improve their own instructions over time.\n\n## Philosophy\n\n- **Open Weights**: All major model releases include downloadable weights and training recipes, enabling full reproducibility and downstream customization.\n- **Model Agnosticism**: Tools are designed to work across providers (OpenAI, Anthropic, local models via Hugging Face, etc.), preventing vendor lock-in.\n- **Self-Improvement as Default**: The organization views autonomous learning and skill creation as essential properties of next-generation AI systems, not optional add-ons.\n- **Decentralized Collaboration**: Research happens in public Discord servers and open GitHub repositories, with contributions from a global community rather than a centralized lab structure.\n\n## Connections\n\n- [[HermesAgent]] — 核心项目\n- [[AIAgent]] — 所属领域\n- [[SelfImprovingAI]] — 研究理念\n- [[OpenAI]] — 支持的 LLM 提供商之一\n- [[Meta]] — LLaMA 系列模型的来源（Nous-Hermes 基于 LLaMA）\n",

    "markdown": "---\ntitle: \"T5\"\ntype: entity\ntags: []\nsources: ['overview', 'foundation-models-overview']\nlast_updated: 2026-04-30\n---\n\n# T5\n\nT5, or Text-to-Text Transfer Transformer, is a family of encoder-decoder models developed by [[Google]]. Its defining innovation is reformulating all natural language processing (NLP) tasks—including translation, summarization, question answering, and classification—into a unified text-to-text framework, where both the input and output are always text strings. This allows a single model architecture and training objective to be applied across diverse tasks by simply prefixing the input with a task-specific cue (e.g., “translate English to German: …”). T5 is a key example of a foundation model built upon the [[Transformer]] architecture, leveraging the [[AttentionMechanism|self-attention]] mechanism introduced in the seminal paper [[Attention Is All You Need]]. The model demonstrated that a unified approach, combined with a large-scale “Colossal Clean Crawled Corpus” (C4), could achieve state-of-the-art performance on many benchmarks, and its design philosophy has influenced subsequent large language models by emphasizing the importance of transfer learning and task-agnostic pretraining.",

    "markdown": "---\ntitle: \"Attention Is All You Need\"\ntype: source\ntags: [paper, nlp, transformer]\ndate: 2017-06-12\nsource_file: raw/attention-is-all-you-need.pdf\n---\n\n## Summary\nThe seminal paper by [[Vaswani]] et al. from [[Google]] Research introducing the [[Transformer]] architecture, which replaced recurrent and convolutional layers with purely attention-based mechanisms.\n\n## Key Claims\n- The [[Transformer]] achieves state-of-the-art translation quality while being more parallelizable and requiring significantly less training time.\n- Self-attention layers are faster than recurrent layers when the sequence length is smaller than the representation dimensionality.\n- The proposed architecture generalizes well to other tasks beyond machine translation.\n\n## Key Quotes\n> \"We propose a new simple network architecture, the Transformer, based solely on attention mechanisms, dispensing with recurrence and convolutions entirely.\"\n\n> \"The Transformer is the first transduction model based entirely on self-attention to compute representations of its input and output without using sequence-aligned RNNs or convolution.\"\n\n## Connections\n- [[Transformer]] — architecture introduced in this paper\n- [[AttentionMechanism]] — core concept\n- [[Google]] — research institution\n- [[Vaswani]] — first author\n\n## Contradictions\n- Earlier work by [[Bahdanau]] proposed attention for RNNs; this paper shows attention alone is sufficient.\n",

    "markdown": "---\ntitle: \"Foundation Models Overview\"\ntype: synthesis\ntags: [overview, llm, foundation-models]\nsources: [intro-to-llms, attention-is-all-you-need]\nlast_updated: 2024-03-25\n---\n\n# Foundation Models Overview\n\nFoundation models are large-scale AI models trained on broad data that can be adapted to a wide range of downstream tasks.\n\n## The Transformer Era\n\nThe modern foundation model era began with the [[Transformer]] architecture (2017), which introduced [[AttentionMechanism|self-attention]] as a replacement for recurrent layers. [[Google]] invented it; [[OpenAI]] scaled it.\n\n## Key Model Families\n\n| Model | Architecture | Organization | Notable Feature |\n|---|---|---|---|\n| [[GPT]] | Decoder-only | [[OpenAI]] | Autoregressive generation |\n| [[BERT]] | Encoder-only | [[Google]] | Bidirectional understanding |\n| [[T5]] | Encoder-decoder | [[Google]] | Text-to-text framework |\n| [[LLaMA]] | Decoder-only | Meta | Open weights |\n\n## Scaling Laws\n\nModel capability improves predictably with:\n- Compute (FLOPs)\n- Data (tokens)\n- Parameters (model size)\n\n## Connections\n- [[Transformer]] — universal architecture\n- [[AttentionMechanism]] — core mechanism\n- [[OpenAI]] — commercial leader\n- [[Google]] — research leader\n",

function hexToRgba(color, alpha) {
  if (!color) return `rgba(255, 255, 255, ${alpha})`;
  const normalized = color.replace("#", "");
  const value = normalized.length === 3
    ? normalized.split("").map(ch => ch + ch).join("")
    : normalized;
  const intValue = Number.parseInt(value, 16);
  const r = (intValue >> 16) & 255;
  const g = (intValue >> 8) & 255;
  const b = intValue & 255;
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function escapeHtml(text) {
  return (text || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function stripFrontmatter(markdown) {
  return (markdown || "").replace(/^---\n[\s\S]*?\n---\n?/, "");
}

function renderInlineMarkdown(text) {
  let html = escapeHtml(text);
  html = html.replace(/\[\[([^\]]+)\]\]/g, '<span class="wikilink">[[$1]]</span>');
  html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
  html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  html = html.replace(/\*([^*]+)\*/g, "<em>$1</em>");
  return html;
}

function renderMarkdown(markdown) {
  const lines = stripFrontmatter(markdown).split(/\r?\n/);
  const html = [];
  let paragraph = [];
  let listType = null;
  let listItems = [];
  let quoteLines = [];
  let inCodeBlock = false;
  let codeLines = [];

  function flushParagraph() {
    if (!paragraph.length) return;
    html.push(`<p>${renderInlineMarkdown(paragraph.join(" "))}</p>`);
    paragraph = [];
  }

  function flushList() {
    if (!listType || !listItems.length) return;
    const items = listItems.map(item => `<li>${renderInlineMarkdown(item)}</li>`).join("");
    html.push(`<${listType}>${items}</${listType}>`);
    listType = null;
    listItems = [];
  }

  function flushQuote() {
    if (!quoteLines.length) return;
    html.push(`<blockquote>${quoteLines.map(line => renderInlineMarkdown(line)).join("<br>")}</blockquote>`);
    quoteLines = [];
  }

  function flushCode() {
    if (!codeLines.length) {
      html.push("<pre><code></code></pre>");
      return;
    }
    html.push(`<pre><code>${escapeHtml(codeLines.join("\n"))}</code></pre>`);
    codeLines = [];
  }

  for (const rawLine of lines) {
    const line = rawLine.replace(/\t/g, "    ");
    const trimmed = line.trim();

    if (trimmed.startsWith("```")) {
      flushParagraph();
      flushList();
      flushQuote();
      if (inCodeBlock) {
        flushCode();
        inCodeBlock = false;
      } else {
        inCodeBlock = true;
      }
      continue;
    }

    if (inCodeBlock) {
      codeLines.push(rawLine);
      continue;
    }

    if (!trimmed) {
      flushParagraph();
      flushList();
      flushQuote();
      continue;
    }

    const headingMatch = trimmed.match(/^(#{1,6})\s+(.+)$/);
    if (headingMatch) {
      flushParagraph();
      flushList();
      flushQuote();
      const level = headingMatch[1].length;
      html.push(`<h${level}>${renderInlineMarkdown(headingMatch[2])}</h${level}>`);
      continue;
    }

    if (/^(-{3,}|\*{3,})$/.test(trimmed)) {
      flushParagraph();
      flushList();
      flushQuote();
      html.push("<hr>");
      continue;
    }

    const quoteMatch = trimmed.match(/^>\s?(.*)$/);
    if (quoteMatch) {
      flushParagraph();
      flushList();
      quoteLines.push(quoteMatch[1]);
      continue;
    }
    flushQuote();

    const unorderedMatch = trimmed.match(/^[-*]\s+(.+)$/);
    if (unorderedMatch) {
      flushParagraph();
      if (listType && listType !== "ul") flushList();
      listType = "ul";
      listItems.push(unorderedMatch[1]);
      continue;
    }

    const orderedMatch = trimmed.match(/^\d+\.\s+(.+)$/);
    if (orderedMatch) {
      flushParagraph();
      if (listType && listType !== "ol") flushList();
      listType = "ol";
      listItems.push(orderedMatch[1]);
      continue;
    }

    flushList();
    paragraph.push(trimmed);
  }

  if (inCodeBlock) flushCode();
  flushParagraph();
  flushList();
  flushQuote();
  return html.join("");
}

function rebuildAdjacency(filteredEdges) {
  adjacency.clear();
  for (const node of originalNodes) {
    adjacency.set(node.id, new Set());
  }
  for (const edge of filteredEdges) {
    if (!adjacency.has(edge.from)) adjacency.set(edge.from, new Set());
    if (!adjacency.has(edge.to)) adjacency.set(edge.to, new Set());
    adjacency.get(edge.from).add(edge.to);
    adjacency.get(edge.to).add(edge.from);
  }
}

function currentEdgeState() {
  const minConf = parseInt(controls.confSlider.value, 10) / 100;
  controls.confValue.textContent = minConf.toFixed(2);
  return {
    showExtracted: controls.extracted.checked,
    showInferred: controls.inferred.checked,
    showAmbiguous: controls.ambiguous.checked,
    minConf,
  };
}

function passesEdgeFilters(edge, edgeState) {
  const typeOk = (edge.type === "EXTRACTED" && edgeState.showExtracted)
    || (edge.type === "INFERRED" && edgeState.showInferred)
    || (edge.type === "AMBIGUOUS" && edgeState.showAmbiguous);
  const confOk = (edge.confidence ?? 1.0) >= edgeState.minConf;
  return typeOk && confOk;
}

function searchNodes(q) {
  applyFilters(q, activeNodeId);
}

function clearSelection() {
  activeNodeId = null;
  closeDrawer();
  applyFilters(searchInput.value, null);
}

function closeDrawer() {
  document.getElementById("drawer").classList.remove("open");
}

function openDrawer(node, relatedIds) {
  document.getElementById("drawer").classList.add("open");
  document.getElementById("drawer-title").textContent = node.label;
  const communityText = Number.isInteger(node.group) && node.group >= 0 ? ` · community ${node.group}` : "";
  document.getElementById("drawer-meta").textContent = `${node.type}${communityText}`;
  document.getElementById("drawer-path").textContent = node.path;
  document.getElementById("drawer-preview").textContent = node.preview || "";
  document.getElementById("drawer-markdown").innerHTML = renderMarkdown(node.markdown || "");

  const relatedList = document.getElementById("drawer-related-list");
  relatedList.innerHTML = "";
  const relatedNodes = originalNodes
    .filter(item => relatedIds.has(item.id) && item.id !== node.id)
    .sort((a, b) => a.label.localeCompare(b.label));

  if (relatedNodes.length === 0) {
    const empty = document.createElement("span");
    empty.textContent = "No directly connected nodes";
    relatedList.appendChild(empty);
    return;
  }

  for (const related of relatedNodes) {
    const chip = document.createElement("button");
    chip.className = "related-chip";
    chip.textContent = related.label;
    chip.onclick = () => focusNode(related.id);
    relatedList.appendChild(chip);
  }
}

function applyFilters(query = searchInput.value, selectedNodeId = activeNodeId) {
  const lower = (query || "").trim().toLowerCase();
  const edgeState = currentEdgeState();
  const filteredEdges = originalEdges.filter(edge => passesEdgeFilters(edge, edgeState));
  rebuildAdjacency(filteredEdges);

  const relatedIds = selectedNodeId
    ? new Set([selectedNodeId, ...(adjacency.get(selectedNodeId) || [])])
    : null;
  const filteredNodeIds = new Set();
  for (const edge of filteredEdges) {
    filteredNodeIds.add(edge.from);
    filteredNodeIds.add(edge.to);
  }

  let visibleNodeCount = 0;
  const nodeUpdates = originalNodes.map(node => {
    const matchesSearch = !lower || node.label.toLowerCase().includes(lower);
    const isActive = selectedNodeId === node.id;
    const isConnected = filteredNodeIds.has(node.id);
    const isRelated = !relatedIds || relatedIds.has(node.id);
    const hidden = !selectedNodeId && !lower && !isConnected;
    const emphasized = matchesSearch && isRelated && (isConnected || !!lower || isActive);

    if (!hidden) {
      visibleNodeCount += 1;
    }

    return {
      id: node.id,
      hidden,
      color: {
        background: emphasized ? node.color : hexToRgba(node.color, hidden ? 0.05 : 0.14),
        border: emphasized ? hexToRgba(node.color, 0.96) : hexToRgba(node.color, hidden ? 0.08 : 0.22),
        highlight: { background: node.color, border: hexToRgba(node.color, 1) },
        hover: { background: node.color, border: hexToRgba(node.color, 1) },
      },
      font: {
        color: emphasized ? "#f2f3f8" : hidden ? "rgba(242,243,248,0.08)" : "rgba(242,243,248,0.2)",
      },
      borderWidth: isActive ? 5 : 2,
      size: isActive ? 18 : 12,
    };
  });

  const edgeUpdates = originalEdges.map(edge => {
    const enabled = passesEdgeFilters(edge, edgeState);
    if (!enabled) {
      return { id: edge.id, hidden: true };
    }

    const matchesSearch = !lower
      || nodeMap.get(edge.from)?.label.toLowerCase().includes(lower)
      || nodeMap.get(edge.to)?.label.toLowerCase().includes(lower);
    const isRelated = !relatedIds || relatedIds.has(edge.from) || relatedIds.has(edge.to);
    const touchesActive = !!selectedNodeId && (edge.from === selectedNodeId || edge.to === selectedNodeId);
    const emphasized = matchesSearch && isRelated;

    return {
      id: edge.id,
      hidden: false,
      width: touchesActive ? 2.8 : emphasized ? 1.2 : 0.6,
      color: emphasized ? edge.color : hexToRgba(edge.color, 0.08),
    };
  });

  nodes.update(nodeUpdates);
  edges.update(edgeUpdates);

  if (selectedNodeId) {
    const activeNode = nodeMap.get(selectedNodeId);
    if (activeNode) {
      openDrawer(activeNode, relatedIds || new Set([selectedNodeId]));
    }
  }

  const focusSuffix = selectedNodeId && nodeMap.get(selectedNodeId)
    ? ` · focused: ${nodeMap.get(selectedNodeId).label}`
    : "";
  stats.textContent = `${visibleNodeCount} nodes · ${filteredEdges.length} edges${focusSuffix}`;
}

const container = document.getElementById("graph");

// Adaptive physics based on graph size
const nodeCount = originalNodes.length;
const gravConst = nodeCount > 80 ? -8000 : nodeCount > 30 ? -5000 : -2000;
const springLen = nodeCount > 80 ? 250 : nodeCount > 30 ? 200 : 150;

const network = new vis.Network(container, { nodes, edges }, {
  nodes: {
    shape: "dot",
    font: { color: "#ddd", size: 12, strokeWidth: 3, strokeColor: "#111" },
    borderWidth: 1.5,
    scaling: {
      min: 8,
      max: 40,
      label: { enabled: true, min: 10, max: 20, drawThreshold: 6, maxVisible: 24 },
    },
  },
  edges: {
    width: 0.8,
    smooth: { type: "continuous" },
    arrows: { to: { enabled: true, scaleFactor: 0.4 } },
    color: { inherit: false },
    hoverWidth: 2,
  },
  physics: {
    stabilization: { iterations: 250, updateInterval: 25, fit: true },
    barnesHut: { gravitationalConstant: gravConst, springLength: springLen, springConstant: 0.02, damping: 0.15 },
    minVelocity: 0.75,
  },
  interaction: { hover: true, tooltipDelay: 150, hideEdgesOnDrag: true, hideEdgesOnZoom: true },
});

// Ensure the graph fits the viewport after physics stabilization
network.once("stabilizationIterationsDone", function () {
  network.fit({ animation: { duration: 400, easingFunction: "easeInOutQuad" } });
});

function focusNode(nodeId) {
  activeNodeId = nodeId;
  applyFilters(searchInput.value, nodeId);
  const node = nodeMap.get(nodeId) || nodes.get(nodeId);
  const relatedIds = new Set([nodeId, ...(adjacency.get(nodeId) || [])]);
  openDrawer(node, relatedIds);
  network.focus(nodeId, {
    scale: 1.1,
    animation: { duration: 300, easingFunction: "easeInOutQuad" },
  });
}

network.on("click", params => {
  if (params.nodes.length > 0) {
    focusNode(params.nodes[0]);
  } else {
    clearSelection();
  }
});

applyFilters();
</script>
