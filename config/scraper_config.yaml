# LLM 爬虫全局配置
# 文件: config/scraper_config.yaml
# 用途: 控制 LLM 爬虫的所有行为参数

scraper:
  # ── 浏览器设置 (Phase 3 启用) ──
  browser:
    enabled: true            # Playwright 已安装，启用 JS 渲染
    timeout: 30
    wait_for_selector: "article, main, .content, #content"

  # ── LLM 提取策略 ──
  extraction:
    provider: "litellm"
    model: "deepseek/deepseek-chat"       # DeepSeek V3 通用模型
    fallback_model: "deepseek/deepseek-chat"  # DeepSeek 无更降级，同模型重试
    max_input_tokens: 20000
    max_output_tokens: 2000
    temperature: 0.1

    # Prompt 模板 (支持从外部文件加载)
    # 注意: 每个模板必须包含 {html} 或 {content} 占位符
    prompts:
      # 正文提取 (必须包含 {html})
      content_extraction: |
        你是一个专业的内容提取助手。从网页HTML中提取正文，输出为干净的Markdown。

        规则:
        1. 排除导航链接、侧边栏、页脚、广告、评论区、推荐阅读
        2. 保留原文标题层级结构 (h1-h6)
        3. 保留表格、列表、代码块等结构化内容
        4. 图片保留 alt 文本，标注 [Image: alt文本]
        5. 若页面主要是链接列表/导航，回复 "NOT_ARTICLE: <原因>"
        6. 仅输出Markdown正文，不加任何解释

        <article>标签内的内容优先；<main>次之；没有则从<body>提取。

        ---
        HTML source:
        {html}
        ---

      # 内容摘要生成 (必须包含 {content})
      summarization: |
        请用2-3句话总结以下文章的核心内容。
        只输出摘要文本，不要加标题、标签或任何解释。

        ---
        {content}
        ---

      # 实体识别 (必须包含 {content})
      entity_extraction: |
        从以下文章提取关键实体，输出JSON数组:
        [
          {{
            "name": "实体名称",
            "type": "person|organization|project|concept|technology",
            "context": "文中的一句话上下文"
          }}
        ]

        实体类型说明:
        - person: 人物
        - organization: 公司/机构/组织
        - project: 项目/产品名
        - concept: 概念/方法论/理论
        - technology: 技术/框架/工具/编程语言

        只输出JSON数组，不要加任何解释。

        ---
        {content}
        ---

  # ── 质量阈值 ──
  quality:
    min_content_length: 200            # 低于此字符数标记为低质量
    trafilatura_bypass_length: 1000    # trafilatura 结果高于此值则跳过 LLM
    llm_min_quality_score: 30          # LLM 质量评分低于此值则丢弃

  # ── 速率控制 ──
  rate_limit:
    max_concurrent: 3                  # 最大并发 LLM 调用
    max_concurrent_http: 5             # 最大并发 HTTP 请求
    requests_per_minute: 10            # 每分钟最大 HTTP 请求数
    retry_max: 3                       # 最大重试次数
    retry_backoff: "exponential"       # 指数退避: 1s, 2s, 4s

  # ── 去重 ──
  dedup:
    url_hash: true                     # 基于 URL 去重 (通过 state.json)

  # ── Playwright 站点特定等待策略 ──
  # 为特定站点配置 wait_for_selector，等待内容加载完成
  site_wait:
    eastmoney.com:
      selector: ".contentwrap, #ContentBody, .main-content"
      timeout: 5000
    cls.cn:
      selector: ".detail-telegraph-content, .article-content"
      timeout: 3000
    gelonghui.com:
      selector: ".article-content, #article-body"
      timeout: 3000

  # ── 站点专用 CSS 选择器 (Phase 6) ──
  # 当域名匹配时，优先使用这些选择器提取正文，再回退到通用策略
  site_selectors:
    eastmoney.com:
      - ".main-content"
      - ".contentwrap"
      - "#ContentBody"
      - ".article-content"
      - ".main-text"
    cls.cn:  # 财联社
      - ".detail-telegraph-content"
      - ".article-content"
      - ".article-detail"
      - ".detail-content"
    gelonghui.com:  # 格隆汇
      - ".article-content"
      - "#article-body"
      - ".article__content"
    xueqiu.com:  # 雪球 (需确认 robots.txt 允许)
      - ".article__bd__detail"
      - ".detail"
      - ".article-content"
    10jqka.com.cn:  # 同花顺
      - ".article-content"
      - ".main-text"
    sina.com.cn:  # 新浪财经 (通常不需要，作为备份)
      - "#artibody"
      - ".article"
    szse.cn:  # 深交所
      - ".content"
      - "#content"
    sse.com.cn:  # 上交所
      - ".content"
      - "#content"
    stats.gov.cn:  # 国家统计局
      - ".content"
      - "#content"
    stcn.com:  # 证券时报
      - ".detail-content-wrapper"
      - ".detail-content"
      - ".content"

  # ── 日志 ──
  logging:
    level: "INFO"
    file: "logs/scraper.log"
