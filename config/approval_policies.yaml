rules:
  - tool: "git_commit"
    pattern: "auto-fix:"
    max_per_hour: 5
  - tool: "terminal_exec"
    pattern: "npm run"
    max_per_hour: 3
  - tool: "terminal_exec"
    pattern: "python tools/health.py"
    max_per_hour: 10

never_auto_approve:
  - "git_push"
  - "terminal_exec(command=rm *)"
  - "terminal_exec(command=del *)"
  - "deploy"
  - "email_send"
